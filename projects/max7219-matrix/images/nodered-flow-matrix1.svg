<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .section-label { font-size: 11px; font-weight: 700; fill: #666; letter-spacing: 1px; }
      .node-label { font-size: 10px; fill: #fff; text-anchor: middle; dominant-baseline: central; }
      .node-label-dark { font-size: 10px; fill: #333; text-anchor: middle; dominant-baseline: central; }
      .conn { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="900" height="700" fill="#ffffff"/>

  <!-- SECTION 1: DATA COLLECTORS -->
  <rect x="20" y="20" width="860" height="155" rx="8" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="36" y="40" class="section-label">DATA COLLECTORS (flow context)</text>

  <rect x="50" y="55" width="170" height="30" rx="6" fill="#4285f4"/>
  <text x="135" y="70" class="node-label">sensor.pv_leistung</text>
  <line x1="220" y1="70" x2="310" y2="70" class="conn"/>
  <rect x="320" y="55" width="155" height="30" rx="6" fill="#f5a623"/>
  <text x="397" y="70" class="node-label">Speichere PV W</text>

  <rect x="50" y="95" width="170" height="30" rx="6" fill="#4285f4"/>
  <text x="135" y="110" class="node-label">sensor.pv_energy_today</text>
  <line x1="220" y1="110" x2="310" y2="110" class="conn"/>
  <rect x="320" y="95" width="155" height="30" rx="6" fill="#f5a623"/>
  <text x="397" y="110" class="node-label">Speichere kWh</text>

  <rect x="50" y="135" width="170" height="30" rx="6" fill="#4285f4"/>
  <text x="135" y="150" class="node-label">sensor.pv_energy_daily</text>
  <line x1="220" y1="150" x2="310" y2="150" class="conn"/>
  <rect x="320" y="135" width="155" height="30" rx="6" fill="#f5a623"/>
  <text x="397" y="150" class="node-label">Speichere Vortag</text>

  <!-- SECTION 2: MAIN DISPLAY LOOP -->
  <rect x="20" y="195" width="860" height="120" rx="8" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="36" y="215" class="section-label">MAIN DISPLAY LOOP (reads flow context)</text>

  <rect x="50" y="240" width="120" height="30" rx="6" fill="#d5d5d5"/>
  <text x="110" y="255" class="node-label-dark">Jede Sekunde</text>
  <line x1="170" y1="255" x2="210" y2="255" class="conn"/>

  <rect x="220" y="240" width="130" height="30" rx="6" fill="#f5a623"/>
  <text x="285" y="255" class="node-label">Anzeige-Logik</text>
  <line x1="350" y1="255" x2="390" y2="255" class="conn"/>

  <rect x="400" y="240" width="110" height="30" rx="6" fill="#f5a623"/>
  <text x="455" y="255" class="node-label">Durchleiten</text>
  <line x1="510" y1="255" x2="565" y2="255" class="conn"/>

  <rect x="575" y="240" width="245" height="30" rx="6" fill="#4caf50"/>
  <text x="697" y="255" class="node-label">cmnd/Matrix1/DisplayText</text>

  <line x1="455" y1="270" x2="455" y2="285" class="conn"/>
  <rect x="400" y="285" width="110" height="26" rx="6" fill="#999"/>
  <text x="455" y="298" class="node-label">Matrix1 Debug</text>

  <!-- SECTION 3: FLASH TRIGGER -->
  <rect x="20" y="335" width="560" height="100" rx="8" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="36" y="355" class="section-label">FLASH TRIGGER (50s Uhr / 10s PV-Daten)</text>

  <rect x="50" y="375" width="155" height="30" rx="6" fill="#d5d5d5"/>
  <text x="127" y="390" class="node-label-dark">Alle 60 Sekunden</text>
  <line x1="205" y1="390" x2="260" y2="390" class="conn"/>

  <rect x="270" y="375" width="165" height="30" rx="6" fill="#f5a623"/>
  <text x="352" y="390" class="node-label">Flash 10s aktivieren</text>

  <!-- SECTION 4: BRIGHTNESS -->
  <rect x="20" y="455" width="860" height="225" rx="8" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="36" y="475" class="section-label">BRIGHTNESS (Nacht-Dimming)</text>

  <rect x="50" y="495" width="145" height="30" rx="6" fill="#d5d5d5"/>
  <text x="122" y="510" class="node-label-dark">22:00 Dimmen</text>
  <path d="M195,510 C380,510 380,558 565,558" class="conn"/>

  <rect x="50" y="545" width="145" height="30" rx="6" fill="#d5d5d5"/>
  <text x="122" y="560" class="node-label-dark">07:00 Hell</text>
  <line x1="195" y1="560" x2="565" y2="560" class="conn"/>

  <rect x="50" y="600" width="145" height="30" rx="6" fill="#d5d5d5"/>
  <text x="122" y="615" class="node-label-dark">Startup</text>
  <line x1="195" y1="615" x2="275" y2="615" class="conn"/>

  <rect x="285" y="600" width="155" height="30" rx="6" fill="#f5a623"/>
  <text x="362" y="615" class="node-label">Tag oder Nacht?</text>
  <path d="M440,615 C500,615 500,562 565,562" class="conn"/>

  <rect x="575" y="545" width="265" height="30" rx="6" fill="#4caf50"/>
  <text x="707" y="560" class="node-label">cmnd/Matrix1/DisplayDimmer</text>

  <!-- LEGEND -->
  <rect x="600" y="460" width="265" height="75" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="615" y="477" font-size="10" font-weight="700" fill="#666">LEGENDE</text>
  <rect x="615" y="485" width="12" height="10" rx="2" fill="#4285f4"/>
  <text x="633" y="494" font-size="9" fill="#555">HA State</text>
  <rect x="695" y="485" width="12" height="10" rx="2" fill="#f5a623"/>
  <text x="713" y="494" font-size="9" fill="#555">Function</text>
  <rect x="775" y="485" width="12" height="10" rx="2" fill="#4caf50"/>
  <text x="793" y="494" font-size="9" fill="#555">MQTT Out</text>
  <rect x="615" y="503" width="12" height="10" rx="2" fill="#d5d5d5"/>
  <text x="633" y="512" font-size="9" fill="#555">Inject</text>
  <rect x="695" y="503" width="12" height="10" rx="2" fill="#999"/>
  <text x="713" y="512" font-size="9" fill="#555">Debug</text>
</svg>
