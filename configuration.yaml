# =============================================================================
# Home Assistant Configuration
# =============================================================================
# Migriert von ioBroker
# Sensible Daten in secrets.yaml ausgelagert
# =============================================================================

homeassistant:
  name: !secret home_name
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  elevation: !secret home_elevation
  unit_system: metric
  currency: EUR
  country: DE
  time_zone: !secret home_timezone
  internal_url: !secret internal_url
  external_url: !secret external_url
  packages: !include_dir_named packages/
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 127.0.0.1/32
        - ::1/128
        - 192.168.178.108/32
      trusted_users:
        "127.0.0.1": c0112751a35c48fa8ee33cbea97f49c6
        "192.168.178.108": c0112751a35c48fa8ee33cbea97f49c6
      allow_bypass_login: true
    - type: homeassistant

# Default Config (empfohlen)
default_config:

# Frontend Themes
frontend:
  themes: !include_dir_merge_named themes

# Logger
logger:
  default: info
  logs:
    homeassistant.components.mqtt: info
    homeassistant.components.tibber: info
    custom_components.diveracontrol.divera_data: critical
    bsblan.bsblan: warning

# History & Recorder
recorder:
  purge_keep_days: 30
  commit_interval: 5
  exclude:
    entities:
      - sensor.unifi_radar
      - sensor.ubertooth_ble_monitor_ble_radar_daten
      - sensor.ubertooth_ble_monitor_ble_devices_liste
      - sensor.ubertooth_ble_monitor_ble_vuln_findings
      - sensor.thw_stoerungs_log
      - sensor.thw_trace_log
  include:
    domains:
      - sensor
      - binary_sensor
      - switch
      - light
      - climate
    entity_globs:
      - sensor.pv_*
      - sensor.tibber_*
      - sensor.server_*
      - sensor.kueche_*
      - sensor.waschmaschine_*
      - sensor.450712_*
      - calendar.450712_*
      - device_tracker.charly_tracker
      - sensor.charly_*
      - binary_sensor.charly_*
      - switch.charly_*
      - sensor.trockner_*

# =============================================================================
# MQTT - Tasmota Geräte werden via Auto-Discovery verwaltet
# =============================================================================
# YAML MQTT Sensoren und Switches entfernt (Feb 2026).
# Tasmota Discovery erstellt Entities automatisch.
# Geräte: Strom-PV, Strom-Server, Strom-Trockner, Strom-Wasch,
#          Strom-KE (Küche), AZ_C8B675 (Arbeitszimmer/Sonoff Basic)
# Weitere MQTT-Sensoren in packages/ (wetter.yaml, wifi_buttons.yaml, etc.)
# =============================================================================

# =============================================================================
# Input Helpers → in packages/energy.yaml definiert
# =============================================================================

# =============================================================================
# Template Sensors
# =============================================================================
template: !include_dir_merge_list templates/

# =============================================================================
# Lovelace Dashboards (YAML Modus)
# =============================================================================
lovelace:
  mode: storage
  dashboards:
    # === HAUPTMENÜ ===
    lovelace-home:
      mode: yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/home.yaml

    # === ENERGIE ===
    lovelace-energie:
      mode: yaml
      title: Energie
      icon: mdi:flash
      show_in_sidebar: true
      filename: dashboards/energie_v2.yaml
    # === WETTER & WARNUNGEN ===
    lovelace-wetter:
