# Media Dashboard
#
# Ueberarbeitet 15.07.2026: Vorherige Version referenzierte Kodi/Chromecast/Plex/
# Spotify-Integrationen die nie existiert haben, sowie raumbasierte Echo-Namen
# (echo_wohnzimmer/echo_kueche/echo_bad). Real vorhanden: 3 Alexa-Geraete ueber
# die alexa_media Integration (marcus_echo_dot/plus/show_8_2nd_gen, keine
# Raumbindung), Sony Bravia TV, sowie Radio/Durchsagen ueber script.notify_alexa
# bzw. media_player.play_media (TUNEIN) - Muster aus packages/wifi_buttons.yaml
# uebernommen. Kein Kodi, kein Chromecast, kein Plex, kein Spotify vorhanden.

title: Medien
views:
  - title: Medien
    path: medien
    icon: mdi:play-circle
    type: sections
    max_columns: 3
    sections:
      # ===== ECHO GERÄTE =====
      - type: grid
        title: "🔊 Echo Geräte"
        cards:
          - type: custom:mushroom-media-player-card
            entity: media_player.marcus_echo_dot
            name: Echo Dot
            use_media_info: true
            show_volume_level: true
            collapsible_controls: true

          - type: custom:mushroom-media-player-card
            entity: media_player.marcus_echo_plus
            name: Echo Plus
            use_media_info: true
            show_volume_level: true
            collapsible_controls: true

          - type: custom:mushroom-media-player-card
            entity: media_player.marcus_echo_show_8_2nd_gen
            name: Echo Show 8
            use_media_info: true
            show_volume_level: true
            collapsible_controls: true

          # TTS / Ankündigungen
          - type: entities
            title: Durchsage
            entities:
              - entity: input_text.alexa_message
                name: Text
              - type: button
                name: An alle Echos ansagen
                icon: mdi:bullhorn
                tap_action:
                  action: call-service
                  service: script.notify_alexa
                  data:
                    message: "{{ states('input_text.alexa_message') }}"

      # ===== RADIOSENDER (via Alexa/TuneIn) =====
      - type: grid
        title: "📻 Radio (Echo Show 8)"
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: action
                icon: mdi:radio
                icon_color: red
                content: WDR 2
                tap_action:
                  action: call-service
                  service: media_player.play_media
                  target:
                    entity_id: media_player.marcus_echo_show_8_2nd_gen
                  data:
                    media_content_id: WDR 2
                    media_content_type: TUNEIN

              - type: action
                icon: mdi:radio
                icon_color: blue
                content: 1Live
                tap_action:
                  action: call-service
                  service: media_player.play_media
                  target:
                    entity_id: media_player.marcus_echo_show_8_2nd_gen
                  data:
                    media_content_id: 1Live
                    media_content_type: TUNEIN

              - type: action
                icon: mdi:radio
                icon_color: orange
                content: NDR 2
                tap_action:
                  action: call-service
                  service: media_player.play_media
                  target:
                    entity_id: media_player.marcus_echo_show_8_2nd_gen
                  data:
                    media_content_id: NDR 2
                    media_content_type: TUNEIN

          # Weitere Sender
          - type: entities
            title: Radiosender
            show_header_toggle: false
            entities:
              - type: button
                name: SWR3
                icon: mdi:radio
                tap_action:
                  action: call-service
                  service: media_player.play_media
                  target:
                    entity_id: media_player.marcus_echo_show_8_2nd_gen
                  data:
                    media_content_id: SWR3
                    media_content_type: TUNEIN

              - type: button
                name: Bayern 3
                icon: mdi:radio
                tap_action:
                  action: call-service
                  service: media_player.play_media
                  target:
                    entity_id: media_player.marcus_echo_show_8_2nd_gen
                  data:
                    media_content_id: Bayern 3
                    media_content_type: TUNEIN

              - type: button
                name: Radio Bob
                icon: mdi:radio
                tap_action:
                  action: call-service
                  service: media_player.play_media
                  target:
                    entity_id: media_player.marcus_echo_show_8_2nd_gen
                  data:
                    media_content_id: Radio Bob
                    media_content_type: TUNEIN

              - type: button
                name: Radio Aus
                icon: mdi:radio-off
                tap_action:
                  action: call-service
                  service: media_player.media_stop
                  target:
                    entity_id: media_player.marcus_echo_show_8_2nd_gen

      # ===== TV =====
      - type: grid
        title: "📺 TV"
        cards:
          - type: custom:mushroom-media-player-card
            entity: media_player.kd_55xe8505_2
            name: Bravia TV
            use_media_info: true
            show_volume_level: true
            collapsible_controls: true

          - type: entities
            title: TV Steuerung
            entities:
              - type: button
                name: Einschalten
                icon: mdi:television
                tap_action:
                  action: call-service
                  service: script.tv_einschalten
              - type: button
                name: Ausschalten
                icon: mdi:television-off
                tap_action:
                  action: call-service
                  service: script.tv_ausschalten

      # ===== TV PROGRAMM =====
      - type: grid
        title: "📅 TV Programm"
        cards:
          - type: markdown
            content: |
              **Jetzt im TV:**

              Das TV-Programm kann über die TVSpielfilm Integration oder
              EPG-Daten angezeigt werden.

              Empfehlung: HACS Card "Upcoming Media Card" oder
              "TV Program Card" verwenden.
