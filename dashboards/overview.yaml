# Overview Dashboard - Hauptübersicht
# Basiert auf VIS View 100_Startseite
#
# Benötigte HACS-Karten:
# - mushroom (für moderne UI)
# - mini-graph-card (für Graphen)
# - atomic-calendar-revive (für Kalender)
# - garbage-collection-card (für Müllabfuhr)
# - weather-card (für Wetter)
# - button-card (für Schnellaktionen)

title: Übersicht
views:
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 4
    sections:
      # ===== WETTER & ZEIT =====
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "{{ now().strftime('%A, %d. %B %Y') }}"
            subtitle: "{{ now().strftime('%H:%M') }} Uhr"

          - type: weather-forecast
            entity: weather.forecast_home
            show_forecast: true
            forecast_type: daily

          # Sonnenauf- und untergang
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:weather-sunset-up
                content: "{{ as_timestamp(state_attr('sun.sun', 'next_rising')) | timestamp_custom('%H:%M') }}"
              - type: template
                icon: mdi:weather-sunset-down
                content: "{{ as_timestamp(state_attr('sun.sun', 'next_setting')) | timestamp_custom('%H:%M') }}"
              - type: entity
                entity: sensor.temperature_outside
                icon: mdi:thermometer

      # ===== ENERGIE / PV =====
      - type: grid
        title: Energie
        cards:
          - type: custom:mushroom-template-card
            primary: "PV Leistung"
            secondary: "{{ states('sensor.pv_total_power') }} W"
            icon: mdi:solar-power
            icon_color: >
              {% if states('sensor.pv_total_power')|float > 1000 %}
                amber
              {% else %}
                grey
              {% endif %}

          - type: gauge
            entity: sensor.pv_total_power
            name: Aktuelle Leistung
            min: 0
            max: 5000
            severity:
              green: 2000
              yellow: 500
              red: 0

          - type: custom:mini-graph-card
            name: PV Tagesverlauf
            entities:
              - sensor.pv_total_power
            hours_to_show: 24
            points_per_hour: 4
            line_color: amber
            show:
              labels: true
              points: false

          - type: custom:mushroom-template-card
            primary: "Tibber Preis"
            secondary: "{{ states('sensor.tibber_current_price') }} €/kWh"
            icon: mdi:currency-eur
            icon_color: >
              {% set price = states('sensor.tibber_current_price')|float %}
              {% if price < 0.20 %}green{% elif price < 0.35 %}yellow{% else %}red{% endif %}

          - type: custom:mushroom-template-card
            primary: "Ersparnis heute"
            secondary: "{{ states('sensor.pv_daily_savings') }} €"
            icon: mdi:piggy-bank
            icon_color: green

      # ===== KLIMA / HEIZUNG =====
      - type: grid
        title: Klima
        cards:
          - type: custom:mushroom-climate-card
            entity: climate.wohnzimmer
            name: Wohnzimmer
            show_temperature_control: true
            collapsible_controls: true

          - type: custom:mushroom-climate-card
            entity: climate.schlafzimmer
            name: Schlafzimmer
            show_temperature_control: true
            collapsible_controls: true

          # Temperatur-Übersicht
          - type: entities
            title: Temperaturen
            entities:
              - entity: sensor.temperature_wohnzimmer
                name: Wohnzimmer
              - entity: sensor.temperature_kueche
                name: Küche
              - entity: sensor.temperature_schlafzimmer
                name: Schlafzimmer
              - entity: sensor.temperature_outside
                name: Außen

      # ===== TERMINE & KALENDER =====
      - type: grid
        title: Termine
        cards:
          # Müllabfuhr
          - type: custom:garbage-collection-card
            entity: sensor.mullabfuhr
            # Oder manuell:
          - type: custom:mushroom-template-card
            primary: Müllabfuhr
            secondary: "{{ states('sensor.trash_next_pickup') }}"
            icon: mdi:trash-can
            icon_color: >
              {% set type = states('sensor.trash_next_type') %}
              {% if type == 'Restmüll' %}grey
              {% elif type == 'Gelber Sack' %}yellow
              {% elif type == 'Papier' %}blue
              {% elif type == 'Bio' %}green
              {% else %}grey{% endif %}

          # Kalender
          - type: custom:atomic-calendar-revive
            name: Termine
            entities:
              - entity: calendar.familie
              - entity: calendar.bvb
                color: '#FDE100'  # BVB Gelb
            maxDaysToShow: 7
            showProgressBar: true

      # ===== SCHNELLZUGRIFF =====
      - type: grid
        title: Schnellzugriff
        cards:
          - type: custom:mushroom-chips-card
            chips:
              # Anwesenheit
              - type: template
                icon: >
                  {% if is_state('group.family', 'home') %}
                    mdi:home-account
                  {% else %}
                    mdi:home-outline
                  {% endif %}
                content: >
                  {% set home = expand('group.family') | selectattr('state', 'eq', 'home') | list | count %}
                  {{ home }} zu Hause
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/anwesenheit

              # Lichter
              - type: template
                icon: mdi:lightbulb-group
                content: >
                  {% set lights_on = states.light | selectattr('state', 'eq', 'on') | list | count %}
                  {{ lights_on }} Lichter
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/lichter

              # Fenster
              - type: template
                icon: >
                  {% set open = states.binary_sensor | selectattr('attributes.device_class', 'eq', 'window') | selectattr('state', 'eq', 'on') | list | count %}
                  {% if open > 0 %}mdi:window-open{% else %}mdi:window-closed{% endif %}
                content: >
                  {% set open = states.binary_sensor | selectattr('attributes.device_class', 'eq', 'window') | selectattr('state', 'eq', 'on') | list | count %}
                  {{ open }} offen

          # Szenen-Buttons
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Alles aus
                icon: mdi:power-off
                icon_color: red
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.alles_aus

              - type: custom:mushroom-template-card
                primary: Guten Morgen
                icon: mdi:weather-sunset-up
                icon_color: amber
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.guten_morgen

              - type: custom:mushroom-template-card
                primary: Film
                icon: mdi:movie
                icon_color: purple
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.film

      # ===== KAMERAS =====
      - type: grid
        title: Kameras
        cards:
          - type: picture-entity
            entity: camera.balkon
            name: Balkon
            show_state: false
            camera_view: live

          - type: picture-entity
            entity: camera.haustuer
            name: Haustür
            show_state: false
            camera_view: live

      # ===== SYSTEM STATUS =====
      - type: grid
        title: System
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: sensor.iobroker_status
                icon: mdi:home-assistant
              - type: entity
                entity: sensor.fritzbox_connection_status
                icon: mdi:router-wireless
              - type: entity
                entity: binary_sensor.internet_connection
                icon: mdi:web

          - type: custom:mushroom-template-card
            primary: "ioBroker"
            secondary: "{{ states('sensor.iobroker_uptime') }}"
            icon: mdi:cog
            icon_color: "{{ 'green' if is_state('sensor.iobroker_status', 'running') else 'red' }}"
            tap_action:
              action: navigate
              navigation_path: /lovelace/system

  # ===== NAVIGATION =====
  - title: Erdgeschoss
    path: eg
    icon: mdi:home-floor-0
    subview: false

  - title: Obergeschoss
    path: og
    icon: mdi:home-floor-1
    subview: false

  - title: Energie
    path: energie
    icon: mdi:solar-power

  - title: Klima
    path: klima
    icon: mdi:thermostat

  - title: Medien
    path: medien
    icon: mdi:play-circle

  - title: System
    path: system
    icon: mdi:cog

  - title: Kameras
    path: kameras
    icon: mdi:cctv
