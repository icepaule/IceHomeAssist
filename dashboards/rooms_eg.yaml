# Erdgeschoss Dashboard
#
# Ueberarbeitet 14.07.2026: Vorherige Version war groesstenteils Mockup-Inhalt
# ohne echte Hardware dahinter (Lichter/Klima/Bewegungsmelder pro Raum,
# 4-Zonen-Bewaesserung). Jetzt auf tatsaechlich vorhandene Geraete reduziert.
# Flur + Bewaesserung komplett entfernt (keine Hardware vorhanden).

title: Erdgeschoss
views:
  - title: Erdgeschoss
    path: eg
    icon: mdi:home-floor-0
    type: sections
    max_columns: 3
    sections:
      # ===== WOHNZIMMER =====
      - type: grid
        title: "🛋️ Wohnzimmer"
        cards:
          - type: custom:mushroom-climate-card
            entity: climate.wz_heizkorper
            show_temperature_control: true
            collapsible_controls: true

          - type: custom:mushroom-entity-card
            entity: binary_sensor.terrassentur_door
            name: Terrassentuer
            icon: mdi:door

          - type: custom:mushroom-cover-card
            entity: cover.rollo_wohnzimmer_curtain
            name: Rollo
            show_position_control: true

          - type: custom:mushroom-light-card
            entity: light.dimmer_wz_light_1
            name: Dimmer
            show_brightness_control: true

          - type: entities
            title: Steckdosen
            entities:
              - entity: switch.licht_wz_mss210_main_channel
                name: Licht (Meross)
              - entity: switch.smart_switch_2404269570533151080bc4e7ae03a0c0_outlet
                name: Steckdose

          - type: entities
            title: TV
            entities:
              - entity: media_player.tv_wohnzimmer
                name: Bravia
              - entity: media_player.kd_55xe8505_2
                name: Bravia (Cast)

          - type: entities
            title: Trinkbrunnen (Katze)
            entities:
              - entity: sensor.trinkbrunnen_purified_water
                name: Gefiltertes Wasser
              - entity: sensor.trinkbrunnen_filter_remaining
                name: Filter verbleibend
              - entity: binary_sensor.trinkbrunnen_water_lack_warning
                name: Wasser leer
              - entity: binary_sensor.trinkbrunnen_replace_filter
                name: Filter wechseln

          - type: entities
            title: Staubsauger
            entities:
              - entity: vacuum.willi_robby
                name: Willi Robby
              - entity: sensor.willi_robby_battery_level
                name: Akku
              - entity: vacuum.conga_1790
                name: Conga

      # ===== KUECHE =====
      - type: grid
        title: "🍳 Kueche"
        cards:
          - type: custom:mushroom-entity-card
            entity: binary_sensor.briefkasten_door
            name: Briefkasten
            icon: mdi:mailbox

          - type: entities
            title: Spuelmaschine (Tuya-Steckdose)
            entities:
              - entity: switch.spule_socket
                name: Schalter
              - entity: sensor.spule_power
                name: Leistung
              - entity: sensor.kitchen_spule_strom_spule_energie
                name: Energie Gesamt

          - type: entities
            title: Geschirrspueler (Siemens)
            entities:
              - entity: sensor.siemens_405100396089025945_bsh_common_status_operationstate
                name: Status
              - entity: binary_sensor.siemens_405100396089025945_bsh_common_status_doorstate
                name: Tuer
              - entity: sensor.siemens_405100396089025945_active_program
                name: Programm
              - entity: sensor.siemens_405100396089025945_bsh_common_option_remainingprogramtime
                name: Restzeit
              - entity: button.siemens_405100396089025945_start_pause
                name: Start/Pause

      # ===== BUERO / ARBEITSZIMMER =====
      - type: grid
        title: "💻 Buero"
        cards:
          - type: custom:mushroom-climate-card
            entity: climate.wifi_smart_trv
            show_temperature_control: true

          - type: custom:mushroom-entity-card
            entity: binary_sensor.az_fenster_door
            name: Fenster
            icon: mdi:window-closed

          - type: custom:mushroom-cover-card
            entity: cover.rolo_arbeitszimmer_curtain
            name: Rollo
            show_position_control: true

          - type: entities
            title: Steckdose / Verbrauch
            entities:
              - entity: switch.strom_arbeitszimmer
                name: Schalter
              - entity: sensor.arbeitszimmer_leistung
                name: Leistung
              - entity: sensor.arbeitszimmer_energie_heute
                name: Heute
              - entity: sensor.arbeitszimmer_kosten_pro_stunde
                name: Kosten/h

      # ===== GARTEN =====
      - type: grid
        title: "🌳 Garten"
        cards:
          - type: sensor
            entity: sensor.tasmota_dht11_temperature
            name: Aussentemperatur (Luft1)
            graph: line

          - type: entities
            title: Wetterstation Luft1
            entities:
              - entity: sensor.tasmota_dht11_humidity
                name: Luftfeuchtigkeit
              - entity: sensor.tasmota_as3935_distance
                name: Blitz Entfernung
              - entity: sensor.tasmota_as3935_energy
                name: Blitz Energie

          - type: entities
            title: PV-Anlage
            entities:
              - entity: sensor.pv_leistung
                name: Leistung
              - entity: sensor.pv_energie_heute
                name: Energie heute
              - entity: sensor.pv_energie_gesamt
                name: Energie gesamt
              - entity: sensor.pv_spannung
                name: Spannung

          - type: entities
            title: Aussensteckdosen
            entities:
              - entity: switch.gerateschuppen_mss210_main_channel
                name: Geraeteschuppen

          - type: entities
            title: Charly (Katze)
            entities:
              - entity: device_tracker.charly_tracker
                name: Standort
              - entity: sensor.charly_tracker_battery
                name: Akku
              - entity: sensor.charly_activity_time
                name: Aktivitaet
              - entity: sensor.charly_day_sleep
                name: Schlaf (Tag)
              - entity: sensor.charly_night_sleep
                name: Schlaf (Nacht)
