# Staubsauger Dashboard - Dreame Vacuum (Willi / Robby)

title: Staubsauger
views:
  - title: Staubsauger
    path: staubsauger
    icon: mdi:robot-vacuum
    cards:
      # =============================================
      # HEADER & KARTE
      # =============================================
      - type: custom:mushroom-title-card
        title: "Willi / Robby"
        subtitle: >
          {{ states('sensor.willi_robby_status') }}
          {% if states('vacuum.willi_robby') == 'cleaning' %}
            — {{ states('sensor.willi_robby_cleaned_area') }} m²,
            {{ states('sensor.willi_robby_cleaning_time') }} min
          {% endif %}

      # Karte (volle Breite)
      - type: picture-entity
        entity: vacuum.willi_robby
        camera_image: camera.willi_robby_map
        show_state: false
        show_name: false

      # =============================================
      # STATUS LEISTE
      # =============================================
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Status
            secondary: "{{ states('sensor.willi_robby_status') }}"
            icon: mdi:robot-vacuum
            icon_color: >
              {% set s = states('vacuum.willi_robby') %}
              {% if s == 'cleaning' %}green
              {% elif s == 'returning' %}blue
              {% elif s == 'paused' %}orange
              {% elif s == 'docked' %}grey
              {% elif s == 'error' %}red
              {% else %}orange{% endif %}
          - type: custom:mushroom-template-card
            primary: Akku
            secondary: "{{ states('sensor.willi_robby_battery_level') }}%"
            icon: >
              {% set b = states('sensor.willi_robby_battery_level')|int(0) %}
              {% if b > 80 %}mdi:battery-high
              {% elif b > 40 %}mdi:battery-medium
              {% else %}mdi:battery-low{% endif %}
            icon_color: >
              {% set b = states('sensor.willi_robby_battery_level')|int(0) %}
              {% if b > 80 %}green{% elif b > 40 %}yellow{% else %}red{% endif %}

      # Aktuelle/Letzte Reinigung
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Fläche
            secondary: "{{ states('sensor.willi_robby_cleaned_area') }} m²"
            icon: mdi:texture-box
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: Dauer
            secondary: "{{ states('sensor.willi_robby_cleaning_time') }} min"
            icon: mdi:timer-outline
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: Wassertank
            secondary: "{{ states('sensor.willi_robby_water_tank') }}"
            icon: mdi:water
            icon_color: cyan

      # Ladestatus
      - type: conditional
        conditions:
          - entity: binary_sensor.willi_robby_charging_state
            state: "on"
        card:
          type: custom:mushroom-template-card
          primary: Wird geladen
          secondary: "{{ states('sensor.willi_robby_charging_status') }}"
          icon: mdi:battery-charging
          icon_color: green

      # Fehler-Anzeige
      - type: conditional
        conditions:
          - entity: sensor.willi_robby_error
            state_not: "No Error"
        card:
          type: custom:mushroom-template-card
          primary: Fehler
          secondary: "{{ states('sensor.willi_robby_error') }}"
          icon: mdi:alert-circle
          icon_color: red

      # =============================================
      # STEUERUNG
      # =============================================
      - type: custom:mushroom-title-card
        title: Steuerung

      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: action
            icon: mdi:play
            tap_action:
              action: call-service
              service: vacuum.start
              target:
                entity_id: vacuum.willi_robby
          - type: action
            icon: mdi:pause
            tap_action:
              action: call-service
              service: vacuum.pause
              target:
                entity_id: vacuum.willi_robby
          - type: action
            icon: mdi:stop
            tap_action:
              action: call-service
              service: vacuum.stop
              target:
                entity_id: vacuum.willi_robby
          - type: action
            icon: mdi:home
            tap_action:
              action: call-service
              service: vacuum.return_to_base
              target:
                entity_id: vacuum.willi_robby
          - type: action
            icon: mdi:crosshairs-gps
            tap_action:
              action: call-service
              service: vacuum.locate
              target:
                entity_id: vacuum.willi_robby

      # =============================================
      # RAUMREINIGUNG (Dreame Segmente)
      # =============================================
      - type: custom:mushroom-title-card
        title: Raumreinigung
        subtitle: Raum antippen zum Starten

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states('select.willi_robby_room_1_name') }}"
            icon: mdi:door
            layout: vertical
            tap_action:
              action: call-service
              service: dreame_vacuum.vacuum_clean_segment
              target:
                entity_id: vacuum.willi_robby
              data:
                segments: 1
          - type: custom:mushroom-template-card
            primary: "{{ states('select.willi_robby_room_2_name') }}"
            icon: mdi:door
            layout: vertical
            tap_action:
              action: call-service
              service: dreame_vacuum.vacuum_clean_segment
              target:
                entity_id: vacuum.willi_robby
              data:
                segments: 2
          - type: custom:mushroom-template-card
            primary: "{{ states('select.willi_robby_room_3_name') }}"
            icon: mdi:door
            layout: vertical
            tap_action:
              action: call-service
              service: dreame_vacuum.vacuum_clean_segment
              target:
                entity_id: vacuum.willi_robby
              data:
                segments: 3

      # Alle Räume
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: action
            icon: mdi:home-floor-a
            content: Alle Räume
            tap_action:
              action: call-service
              service: dreame_vacuum.vacuum_clean_segment
              target:
                entity_id: vacuum.willi_robby
              data:
                segments: [1, 2, 3]

      # =============================================
      # EINSTELLUNGEN
      # =============================================
      - type: entities
        title: Einstellungen
        show_header_toggle: false
        entities:
          - entity: select.willi_robby_suction_level
            name: Saugstärke
            icon: mdi:fan
          - entity: select.willi_robby_water_volume
            name: Wassermenge
            icon: mdi:water
          - entity: switch.willi_robby_carpet_boost
            name: Teppich-Boost
            icon: mdi:rug
          - entity: switch.willi_robby_dnd
            name: Nicht stören
            icon: mdi:bell-off
          - entity: number.willi_robby_volume
            name: Lautstärke
            icon: mdi:volume-high
          - entity: switch.willi_robby_resume_cleaning
            name: Reinigung fortsetzen
            icon: mdi:play-pause
          - entity: select.willi_robby_selected_map
            name: Karte auswählen
            icon: mdi:map
          - entity: switch.willi_robby_multi_floor_map
            name: Mehrstöckige Karten
            icon: mdi:layers

      # =============================================
      # VERBRAUCHSMATERIAL
      # =============================================
      - type: custom:mushroom-title-card
        title: Verbrauchsmaterial

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.willi_robby_main_brush_left
            name: Hauptbürste
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: gauge
            entity: sensor.willi_robby_side_brush_left
            name: Seitenbürste
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.willi_robby_filter_left
            name: Filter
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: gauge
            entity: sensor.willi_robby_sensor_dirty_left
            name: Sensoren
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0

      # Verbleibende Lebensdauer Detail
      - type: entities
        title: Verbleibende Lebensdauer
        show_header_toggle: false
        entities:
          - entity: sensor.willi_robby_main_brush_time_left
            name: Hauptbürste
            icon: mdi:brush
          - entity: sensor.willi_robby_side_brush_time_left
            name: Seitenbürste
            icon: mdi:brush
          - entity: sensor.willi_robby_filter_time_left
            name: Filter
            icon: mdi:air-filter
          - entity: sensor.willi_robby_sensor_dirty_time_left
            name: Sensoren
            icon: mdi:eye-outline

      # Reset-Buttons
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: action
            icon: mdi:brush
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.willi_robby_reset_main_brush
              confirmation:
                text: Hauptbürste wirklich zurücksetzen?
          - type: action
            icon: mdi:brush
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.willi_robby_reset_side_brush
              confirmation:
                text: Seitenbürste wirklich zurücksetzen?
          - type: action
            icon: mdi:air-filter
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.willi_robby_reset_filter
              confirmation:
                text: Filter wirklich zurücksetzen?
          - type: action
            icon: mdi:eye
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.willi_robby_reset_sensor
              confirmation:
                text: Sensoren wirklich zurücksetzen?

      # =============================================
      # STATISTIKEN
      # =============================================
      - type: entities
        title: Statistiken
        show_header_toggle: false
        entities:
          - entity: sensor.willi_robby_total_cleaned_area
            name: Gesamtfläche
            icon: mdi:texture-box
          - entity: sensor.willi_robby_total_cleaning_time
            name: Gesamte Betriebszeit
            icon: mdi:clock-outline
          - entity: sensor.willi_robby_cleaning_count
            name: Anzahl Reinigungen
            icon: mdi:counter
          - entity: sensor.willi_robby_first_cleaning_date
            name: Erster Einsatz
            icon: mdi:calendar-start
          - entity: sensor.willi_robby_cleaning_history
            name: Letzte Reinigungen
            icon: mdi:history

      # Reinigungsverlauf Graph
      - type: custom:mini-graph-card
        name: Reinigungsverlauf (7 Tage)
        entities:
          - entity: sensor.willi_robby_cleaned_area
            name: Fläche (m²)
        hours_to_show: 168
        aggregate_func: max
        group_by: date
        line_color: '#2196F3'
        show:
          labels: true
          points: true
