# Obergeschoss Dashboard
# Basiert auf VIS Views 300-399

title: Obergeschoss
views:
  - title: Obergeschoss
    path: og
    icon: mdi:home-floor-1
    type: sections
    max_columns: 2
    sections:
      # ===== SCHLAFZIMMER =====
      - type: grid
        title: "🛏️ Schlafzimmer"
        cards:
          # Klima
          - type: custom:mushroom-climate-card
            entity: climate.schlafzimmer_heizung
            name: Heizung
            show_temperature_control: true
            collapsible_controls: true

          - type: horizontal-stack
            cards:
              - type: sensor
                entity: sensor.schlafzimmer_temperatur
                name: Temperatur
                graph: line

              - type: sensor
                entity: sensor.schlafzimmer_luftfeuchtigkeit
                name: Luftfeuchtigkeit

          # Fenster
          - type: custom:mushroom-template-card
            primary: Fenster
            secondary: "{{ states('binary_sensor.schlafzimmer_fenster') }}"
            icon: >
              {{ 'mdi:window-open' if is_state('binary_sensor.schlafzimmer_fenster', 'on') else 'mdi:window-closed' }}
            icon_color: >
              {{ 'orange' if is_state('binary_sensor.schlafzimmer_fenster', 'on') else 'green' }}

          # Lichter
          - type: custom:mushroom-light-card
            entity: light.schlafzimmer_deckenlampe
            name: Deckenlampe
            show_brightness_control: true
            show_color_control: true

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-light-card
                entity: light.schlafzimmer_nachttisch_links
                name: Nachttisch L
                layout: vertical
                show_brightness_control: true

              - type: custom:mushroom-light-card
                entity: light.schlafzimmer_nachttisch_rechts
                name: Nachttisch R
                layout: vertical
                show_brightness_control: true

          # Steckdosen
          - type: entities
            title: Geräte
            entities:
              - entity: switch.schlafzimmer_ladegeraet
                name: Ladegerät
                icon: mdi:cellphone-charging
              - entity: sensor.schlafzimmer_steckdose_power
                name: Verbrauch

          # Wecker
          - type: custom:mushroom-template-card
            primary: Wecker
            secondary: "{{ states('input_datetime.wecker_schlafzimmer') }}"
            icon: mdi:alarm
            icon_color: "{{ 'amber' if is_state('input_boolean.wecker_aktiv', 'on') else 'grey' }}"
            tap_action:
              action: more-info
              entity: input_datetime.wecker_schlafzimmer

      # ===== ANKLEIDE =====
      - type: grid
        title: "👔 Ankleide"
        cards:
          - type: custom:mushroom-climate-card
            entity: climate.ankleide_heizung
            name: Heizung
            show_temperature_control: true

          - type: sensor
            entity: sensor.ankleide_temperatur
            name: Temperatur

          - type: custom:mushroom-light-card
            entity: light.ankleide_deckenlampe
            name: Beleuchtung
            show_brightness_control: true

      # ===== BADEZIMMER =====
      - type: grid
        title: "🚿 Badezimmer"
        cards:
          - type: horizontal-stack
            cards:
              - type: sensor
                entity: sensor.bad_temperatur
                name: Temperatur

              - type: sensor
                entity: sensor.bad_luftfeuchtigkeit
                name: Luftfeuchtigkeit

          - type: custom:mushroom-template-card
            primary: Lüftung empfohlen
            secondary: >
              {% set humidity = states('sensor.bad_luftfeuchtigkeit')|float %}
              {% if humidity > 70 %}
                Luftfeuchtigkeit hoch ({{ humidity }}%)
              {% else %}
                Alles OK
              {% endif %}
            icon: mdi:fan
            icon_color: "{{ 'blue' if states('sensor.bad_luftfeuchtigkeit')|float > 70 else 'grey' }}"

          # Fenster
          - type: custom:mushroom-entity-card
            entity: binary_sensor.bad_fenster
            name: Fenster

          # Licht
          - type: custom:mushroom-light-card
            entity: light.bad_deckenlampe
            name: Deckenlampe

          # Echo/Alexa
          - type: custom:mushroom-media-player-card
            entity: media_player.echo_bad
            name: Echo Bad
            use_media_info: true
            show_volume_level: true

      # ===== ÜBERSICHT OG =====
      - type: grid
        title: Übersicht OG
        cards:
          # Alle Fenster OG
          - type: custom:mushroom-template-card
            primary: Fenster OG
            secondary: >
              {% set open = [
                states('binary_sensor.schlafzimmer_fenster'),
                states('binary_sensor.ankleide_fenster'),
                states('binary_sensor.bad_fenster')
              ] | select('eq', 'on') | list | count %}
              {{ open }} von 3 offen
            icon: mdi:window-closed-variant
            icon_color: "{{ 'orange' if open > 0 else 'green' }}"

          # Alle Lichter OG
          - type: custom:mushroom-template-card
            primary: Lichter OG
            secondary: >
              {% set lights_on = expand('group.lichter_og') | selectattr('state', 'eq', 'on') | list | count %}
              {{ lights_on }} an
            icon: mdi:lightbulb-group
            icon_color: "{{ 'amber' if lights_on > 0 else 'grey' }}"
            tap_action:
              action: call-service
              service: light.turn_off
              target:
                entity_id: group.lichter_og

          # Temperatur-Vergleich
          - type: custom:mini-graph-card
            name: Temperaturen OG
            entities:
              - entity: sensor.schlafzimmer_temperatur
                name: Schlafzimmer
              - entity: sensor.ankleide_temperatur
                name: Ankleide
              - entity: sensor.bad_temperatur
                name: Bad
            hours_to_show: 24
            line_width: 2
            show:
              labels: true
              legend: true
