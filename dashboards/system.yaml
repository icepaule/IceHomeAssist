# System Dashboard
# Basiert auf VIS Views 400-499
# ioBroker, Netzwerk, VMware, Kameras

title: System
views:
  - title: System
    path: system
    icon: mdi:cog
    type: sections
    max_columns: 3
    sections:
      # ===== QUICK STATUS =====
      - type: grid
        title: Systemstatus
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:home-assistant
                icon_color: green
                content: HA OK
              - type: entity
                entity: sensor.home_assistant_core_cpu_percent
                icon: mdi:cpu-64-bit
              - type: entity
                entity: sensor.home_assistant_supervisor_memory_percent
                icon: mdi:memory
              - type: entity
                entity: sensor.home_assistant_host_disk_used
                icon: mdi:harddisk

      # ===== HOME ASSISTANT =====
      - type: grid
        title: "🏠 Home Assistant"
        cards:
          - type: entities
            entities:
              - entity: update.home_assistant_core_update
                name: HA Version
                icon: mdi:home-assistant
              - entity: update.home_assistant_supervisor_update
                name: Supervisor Update
              - entity: sensor.home_assistant_core_cpu_percent
                name: CPU
              - entity: sensor.home_assistant_supervisor_memory_percent
                name: RAM
              - entity: sensor.home_assistant_host_disk_used
                name: Speicher belegt

          - type: custom:mini-graph-card
            name: CPU & RAM
            entities:
              - entity: sensor.home_assistant_core_cpu_percent
                name: CPU
                color: "#ff6384"
              - entity: sensor.home_assistant_supervisor_memory_percent
                name: RAM
                color: "#36a2eb"
            hours_to_show: 24
            line_width: 2

      # ===== NETZWERK =====
      - type: grid
        title: "🌐 Netzwerk"
        cards:
          # Fritz!Box Status
          - type: custom:mushroom-template-card
            primary: Fritz!Box 6591
            secondary: >
              {% if is_state('binary_sensor.fritz_box_6591_cable_vodafone_connection', 'on') %}
                Verbunden — Uptime: {{ states('sensor.fritz_uptime') }}
              {% else %}
                Getrennt!
              {% endif %}
            icon: mdi:router-wireless
            icon_color: >
              {{ 'green' if is_state('binary_sensor.fritz_box_6591_cable_vodafone_connection', 'on') else 'red' }}

          # Fritz!Box Verbindungswerte
          - type: entities
            title: Verbindung
            entities:
              - entity: sensor.fritz_link_download
                name: Link Download
                icon: mdi:download-network-outline
              - entity: sensor.fritz_link_upload
                name: Link Upload
                icon: mdi:upload-network-outline
              - entity: sensor.fritz_max_download
                name: Max Download
                icon: mdi:speedometer
              - entity: sensor.fritz_max_upload
                name: Max Upload
                icon: mdi:speedometer
              - entity: sensor.fritz_box_6591_cable_vodafone_external_ip
                name: Externe IP
                icon: mdi:ip-network
              - entity: sensor.fritz_box_6591_cable_vodafone_gb_received
                name: GB empfangen
                icon: mdi:download
              - entity: sensor.fritz_box_6591_cable_vodafone_gb_sent
                name: GB gesendet
                icon: mdi:upload
              - entity: sensor.fritz_box_6591_cable_vodafone_cpu_temperature
                name: CPU Temperatur
                icon: mdi:thermometer

          # Internet Speedtest
          - type: entities
            title: Speedtest
            entities:
              - entity: sensor.speedtest_download
                name: Download
                icon: mdi:download-network
              - entity: sensor.speedtest_upload
                name: Upload
                icon: mdi:upload-network
              - entity: sensor.speedtest_ping
                name: Ping
                icon: mdi:lan-pending
              - entity: sensor.speedtest_server
                name: Server
                icon: mdi:server-network
              - entity: sensor.speedtest_letzter_test
                name: Letzter Test
                icon: mdi:clock-check

          # Aktueller Durchsatz
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "↓ {{ states('sensor.internet_download_aktuell') }} kB/s"
                secondary: Aktuell Download
                icon: mdi:download
                icon_color: green
              - type: custom:mushroom-template-card
                primary: "↑ {{ states('sensor.internet_upload_aktuell') }} kB/s"
                secondary: Aktuell Upload
                icon: mdi:upload
                icon_color: blue

          # Unifi
          - type: custom:mushroom-template-card
            primary: Unifi Controller
            secondary: "{{ states('sensor.unifi_total_clients') }} Clients"
            icon: mdi:access-point-network
            icon_color: blue
            tap_action:
              action: navigate
              navigation_path: /lovelace-system/netzwerk-details

          # Access Points (nur Gesamt-Zahlen verfuegbar, keine Aufschluesselung pro Raum)
          - type: entities
            title: Access Points
            entities:
              - entity: sensor.unifi_aps_online
                name: APs Online
                icon: mdi:access-point
              - entity: sensor.unifi_aps_gesamt
                name: APs Gesamt
                icon: mdi:access-point-network

          # AdGuard (ersetzt Pi-hole, keine Blocklist-Statistik-Sensoren verfuegbar)
          - type: entities
            title: AdGuard
            entities:
              - entity: device_tracker.adguard
                name: AdGuard Pi

      # ===== NAS / STORAGE =====
      # ESXi/QNAP komplett entfernt (ESXi ausser Dienst -> prox2, kein QNAP
      # vorhanden - echte NAS-Hardware ist Synology "SynNAS")
      - type: grid
        title: "💾 Speicher (SynNAS)"
        cards:
          - type: custom:mushroom-template-card
            primary: SynNAS
            secondary: "Volume 1: {{ states('sensor.synnas_volume_1_status') }}"
            icon: mdi:nas
            icon_color: "{{ 'green' if is_state('sensor.synnas_volume_1_status', 'normal') else 'red' }}"

          - type: gauge
            entity: sensor.synnas_volume_1_volume_used
            name: Volume 1 belegt
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90

          - type: gauge
            entity: sensor.synnas_volume_2_volume_used
            name: Volume 2 belegt
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90

          - type: entities
            title: SynNAS Details
            entities:
              - entity: sensor.synnas_cpu_utilization_total
                name: CPU
              - entity: sensor.synnas_memory_usage_real
                name: RAM
              - entity: sensor.synnas_temperature
                name: Temperatur
              - entity: update.synnas_dsm_update
                name: DSM Update

      # ===== GERÄTE PING =====
      - type: grid
        title: "📡 Geräte"
        cards:
          - type: entities
            title: Status
            show_header_toggle: false
            entities:
              - entity: binary_sensor.fritz_box_6591_cable_vodafone_connection
                name: Fritz!Box
              - entity: binary_sensor.unifi_controller_online
                name: Unifi Controller
              - entity: binary_sensor.synnas_security_status
                name: SynNAS Sicherheit
              - entity: sensor.brother_mfc_j5730dw
                name: Drucker (Brother)

  # ===== NETZWERK DETAILS SUBVIEW =====
  - title: Netzwerk Details
    path: netzwerk-details
    icon: mdi:lan
    subview: true
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Netzwerk Details

          # Aktueller Status
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Internet
                secondary: >
                  {% if is_state('binary_sensor.fritz_box_6591_cable_vodafone_connection', 'on') %}
                    Verbunden — {{ states('sensor.fritz_uptime') }}
                  {% else %}
                    Getrennt!
                  {% endif %}
                icon: mdi:router-wireless
                icon_color: >
                  {{ 'green' if is_state('binary_sensor.fritz_box_6591_cable_vodafone_connection', 'on') else 'red' }}
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.fritz_box_6591_cable_vodafone_external_ip') }}"
                secondary: Externe IP
                icon: mdi:ip-network
                icon_color: blue

          # Speedtest aktuell
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.speedtest_download') }} Mbit/s"
                secondary: Download
                icon: mdi:download-network
                icon_color: green
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.speedtest_upload') }} Mbit/s"
                secondary: Upload
                icon: mdi:upload-network
                icon_color: blue
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.speedtest_ping') }} ms"
                secondary: Ping
                icon: mdi:lan-pending
                icon_color: >
                  {% set p = states('sensor.speedtest_ping')|float(0) %}
                  {% if p < 20 %}green{% elif p < 50 %}orange{% else %}red{% endif %}

          # ---- VERLAUF: TAG (24h) ----
          - type: custom:mushroom-title-card
            title: Verlauf - Heute (24h)

          - type: custom:mini-graph-card
            name: Download & Upload (24h)
            entities:
              - entity: sensor.speedtest_download
                name: Download (Mbit/s)
                color: "#4CAF50"
              - entity: sensor.speedtest_upload
                name: Upload (Mbit/s)
                color: "#2196F3"
            hours_to_show: 24
            points_per_hour: 4
            line_width: 2
            show:
              labels: true
              legend: true
              points: true

          - type: custom:mini-graph-card
            name: Ping (24h)
            entities:
              - entity: sensor.speedtest_ping
                name: Ping (ms)
                color: "#FF9800"
            hours_to_show: 24
            points_per_hour: 4
            line_width: 2
            show:
              labels: true
              points: true

          # ---- VERLAUF: WOCHE (7 Tage) ----
          - type: custom:mushroom-title-card
            title: Verlauf - Woche (7 Tage)

          - type: custom:mini-graph-card
            name: Download & Upload (7 Tage)
            entities:
              - entity: sensor.speedtest_download
                name: Download (Mbit/s)
                color: "#4CAF50"
              - entity: sensor.speedtest_upload
                name: Upload (Mbit/s)
                color: "#2196F3"
            hours_to_show: 168
            points_per_hour: 0.5
            line_width: 2
            show:
              labels: true
              legend: true

          - type: custom:mini-graph-card
            name: Ping (7 Tage)
            entities:
              - entity: sensor.speedtest_ping
                name: Ping (ms)
                color: "#FF9800"
            hours_to_show: 168
            points_per_hour: 0.5
            line_width: 2
            show:
              labels: true

          # ---- VERLAUF: MONAT (30 Tage) ----
          - type: custom:mushroom-title-card
            title: Verlauf - Monat (30 Tage)

          - type: statistics-graph
            title: Download & Upload (30 Tage)
            entities:
              - sensor.speedtest_download
              - sensor.speedtest_upload
            days_to_show: 30
            stat_types:
              - mean
              - min
              - max
            period: day

          - type: statistics-graph
            title: Ping (30 Tage)
            entities:
              - sensor.speedtest_ping
            days_to_show: 30
            stat_types:
              - mean
              - max
            period: day

          # ---- VERLAUF: JAHR (365 Tage) ----
          - type: custom:mushroom-title-card
            title: Verlauf - Jahr

          - type: statistics-graph
            title: Download & Upload (Jahr)
            entities:
              - sensor.speedtest_download
              - sensor.speedtest_upload
            days_to_show: 365
            stat_types:
              - mean
              - min
              - max
            period: week

          - type: statistics-graph
            title: Ping (Jahr)
            entities:
              - sensor.speedtest_ping
            days_to_show: 365
            stat_types:
              - mean
              - max
            period: week

          # ---- Fritz!Box Durchsatz Live ----
          - type: custom:mushroom-title-card
            title: Fritz!Box Durchsatz

          - type: custom:mini-graph-card
            name: Durchsatz aktuell (kB/s)
            entities:
              - entity: sensor.internet_download_aktuell
                name: Download
                color: "#4CAF50"
              - entity: sensor.internet_upload_aktuell
                name: Upload
                color: "#2196F3"
            hours_to_show: 6
            points_per_hour: 12
            line_width: 2
            show:
              labels: true
              legend: true

          # Fritz!Box Details
          - type: entities
            title: Fritz!Box Details
            entities:
              - entity: sensor.fritz_link_download
                name: Link Download
                icon: mdi:download-network-outline
              - entity: sensor.fritz_link_upload
                name: Link Upload
                icon: mdi:upload-network-outline
              - entity: sensor.fritz_max_download
                name: Max Download
                icon: mdi:speedometer
              - entity: sensor.fritz_max_upload
                name: Max Upload
                icon: mdi:speedometer
              - entity: sensor.fritz_box_6591_cable_vodafone_gb_received
                name: GB empfangen
                icon: mdi:download
              - entity: sensor.fritz_box_6591_cable_vodafone_gb_sent
                name: GB gesendet
                icon: mdi:upload
              - entity: sensor.fritz_box_6591_cable_vodafone_cpu_temperature
                name: Fritz CPU Temp
                icon: mdi:thermometer
              - entity: sensor.fritz_box_6591_cable_vodafone_last_restart
                name: Letzter Neustart
                icon: mdi:restart

          # Wake on LAN (nur eindeutig zuordenbare Geraete - "Desktop PC"/
          # "Server" generisch gab es so nicht, echte Buttons sind pro Geraet)
          - type: entities
            title: Wake on LAN
            show_header_toggle: false
            entities:
              - entity: button.synas_wake_on_lan
                name: SynNAS
                icon: mdi:nas
              - entity: button.brother_wake_on_lan
                name: Drucker
                icon: mdi:printer

  # Kameras-View entfernt (14.07.2026): keine echte Kamera-Hardware
  # (Balkon/Haustuer-Kameras existierten nie) - nur Immich-Slideshow und
  # Kiosk-Tablet-Kamera sind real, siehe lovelace-immich/lovelace-kiosk.

  # ===== LOGS =====
  - title: Logs
    path: logs
    icon: mdi:text-box-outline
    cards:
      - type: logbook
        entities:
          - automation
          - script
        hours_to_show: 24
        title: System Logs
