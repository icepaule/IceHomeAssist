      # =====================================================================
      - type: custom:mushroom-entity-card
        entity: sensor.sonstiger_verbrauch
        name: Unbekannter / Sonstiger Verbrauch
        icon: mdi:help-circle-outline
        icon_color: |-
          {% set p = states('sensor.sonstiger_verbrauch') | float(0) %}
          {% if p > 500 %}red{% elif p > 200 %}orange{% else %}green{% endif %}

      # =====================================================================
      # RadialBar: Aktuelle Leistungsverteilung
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Aktuelle Leistungsverteilung
        chart_type: radialBar
        apex_config:
          chart:
            height: 350
          plotOptions:
            radialBar:
              dataLabels:
                name:
                  fontSize: '14px'
                value:
                  fontSize: '16px'
                  formatter: |
                    EVAL:function(val) { return val.toFixed(0) + ' W'; }
