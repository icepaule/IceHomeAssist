  # ENERGIEFLUSS
  # ===========================================================================
  - title: Energiefluss
    path: energiefluss
    icon: mdi:transmission-tower
    cards:

      # =====================================================================
      # Mushroom-Karten: Netz / PV / Haus Gesamt
      # =====================================================================
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.tibber_pulse_paule_power
            name: Netz
