      # =====================================================================
      # Netzverbrauch vs PV Erzeugung 24h
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Netz vs. PV (24h)
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        apex_config:
          chart:
            height: 280
          tooltip:
            x:
              format: "HH:mm"
        yaxis:
          - min: 0
            apex_config:
              labels:
                formatter: |
                  EVAL:function(val) { return val.toFixed(0) + ' W'; }
