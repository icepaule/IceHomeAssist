            type: area
            name: Netz
            color: '#F44336'
            stroke_width: 2
            opacity: 0.3
            group_by:
              func: avg
              duration: 15min
          - entity: sensor.pv_leistung
            type: area
            name: PV
            color: '#4CAF50'
            stroke_width: 2
            opacity: 0.3
            group_by:
              func: avg
              duration: 15min

