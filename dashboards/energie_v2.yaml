  # ===========================================================================
  # PV ANLAGE → SUBVIEW: Solartracker (Single-Axis Neigung)
  # ===========================================================================
  - title: Solartracker
    path: solartracker
    icon: mdi:angle-acute
    subview: true
    back_path: /lovelace-energie/pv
    cards:
      - type: markdown
        content: |
          ## Solar-Tracker (Neigung)
          Single-Axis-Steuerung *esp_solar* @ `10.10.12.92` (IoT-VLAN).
          Bedienung via cmnd/solar/MANUAL|MIN_ANGLE|RECALC siehe Karten unten.

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.solartracker_aktueller_winkel
            name: Aktuell
            min: 0
            max: 90
            needle: true
            severity:
              green: 30
              yellow: 60
              red: 80
          - type: gauge
            entity: sensor.solartracker_ziel_winkel
            name: Ziel
            min: 0
            max: 90
            needle: true
          - type: gauge
            entity: sensor.solartracker_sonnen_winkel
            name: Sonne (optimal)
            min: 0
            max: 90
            needle: true

      - type: entities
        title: Winkel
        state_color: true
        entities:
          - entity: sensor.solartracker_aktueller_winkel
            name: Ist
          - entity: sensor.solartracker_ziel_winkel
            name: Soll
          - entity: sensor.solartracker_sonnen_winkel
            name: Sonne (berechnet)
          - entity: sensor.solartracker_abweichung
            name: Ist − Soll
          - type: divider
          - entity: sensor.solartracker_min_winkel
            name: Min (mechanisch)
          - entity: sensor.solartracker_max_winkel
            name: Max (mechanisch)

      - type: entities
        title: Zustand
        state_color: true
        entities:
          - entity: sensor.solartracker_motor
            name: Motor
            icon: mdi:engine-outline
          - entity: binary_sensor.solartracker_manual_override
            name: Manual-Override
          - entity: binary_sensor.solartracker_nacht
            name: Nacht
          - entity: binary_sensor.solartracker_online
            name: Online

      - type: entities
        title: Notfall-Modus (Unwetter)
        state_color: true
        entities:
          - entity: binary_sensor.pv_emergency_trigger
            name: Auslöser (DWD/NINA/Force)
            secondary_info: last-changed
          - type: attribute
            entity: binary_sensor.pv_emergency_trigger
            attribute: reason
            name: Grund
            icon: mdi:information-outline
          - entity: binary_sensor.solartracker_emergency_echo
            name: ESP-Echo (Emergency aktiv)
          - entity: input_boolean.pv_emergency_force
            name: Manuell erzwingen (Override)
          - type: divider
          - entity: sensor.gemeinde_ottobrunn_current_warning_level
            name: DWD Level (Ottobrunn)
            secondary_info: last-changed
          - entity: sensor.nina_munchen_warnung_schwere
            name: NINA Schwere
          - entity: sensor.nina_munchen_warnung_aktuell
            name: NINA Headline

      - type: history-graph
        title: Winkelverlauf (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.solartracker_aktueller_winkel
          - entity: sensor.solartracker_ziel_winkel
          - entity: sensor.solartracker_sonnen_winkel

      - type: entities
        title: Boot-Diagnose (tele/solar/BOOT, retained)
        state_color: true
        entities:
          - entity: sensor.solartracker_boot_grund
            name: Reset-Grund (letzter Boot)
            icon: mdi:restart-alert
          - entity: sensor.solartracker_letzter_boot
            name: Boot-Info (roh)
            secondary_info: last-changed
          - type: attribute
            entity: sensor.solartracker_letzter_boot
            attribute: time
            name: Zeitpunkt (ESP-Uhr)
            icon: mdi:clock-outline
          - type: attribute
            entity: sensor.solartracker_letzter_boot
            attribute: rc
            name: rc (Kurzcode)
          - type: attribute
            entity: sensor.solartracker_letzter_boot
            attribute: code
            name: reset_cause-Code
          - type: attribute
            entity: sensor.solartracker_letzter_boot
            attribute: heap
            name: Heap free (Bytes)
            icon: mdi:memory
          - type: attribute
            entity: sensor.solartracker_letzter_boot
            attribute: t_ms
            name: t (ms seit Boot bis Publish)

      - type: entities
        title: Diagnose
        entities:
          - entity: sensor.solartracker_roh_winkel_mpu
            name: Roh-Winkel (MPU)
          - entity: sensor.solartracker_wlan_rssi
          - entity: sensor.solartracker_uptime
          - entity: sensor.solartracker_heap_frei
          - entity: sensor.solartracker_letzter_fehler

      # WLAN-RSSI 24h: zeigt Stuerze + Online/Offline-Phasen.
      # Online-Status zusaetzlich als zweite Card (history-graph), weil
      # apexcharts ueber unavailable-Phasen interpoliert -> Online-Sensor
      # macht Abrisse explizit sichtbar.
      - type: custom:apexcharts-card
        header:
          show: true
          title: WLAN-RSSI 24h (esp_solar)
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          end: minute
        yaxis:
          - min: -95
            max: -40
            decimals: 0
            apex_config:
              title:
                text: dBm
              tickAmount: 5
        apex_config:
          chart:
            height: 240
          stroke:
            curve: smooth
            width: 2
          annotations:
            yaxis:
              - y: -70
                borderColor: '#fbc02d'
                label:
                  text: '-70 (Grenzbereich)'
                  style:
                    color: '#000000'
                    background: '#fbc02d'
              - y: -80
                borderColor: '#e53935'
                label:
                  text: '-80 (kritisch)'
                  style:
                    color: '#ffffff'
                    background: '#e53935'
        series:
          - entity: sensor.solartracker_wlan_rssi
            name: RSSI esp_solar
            type: line
            stroke_width: 2
            float_precision: 0
            group_by:
              func: avg
              duration: 2min
            color_threshold:
              - value: -85
                color: '#b71c1c'
              - value: -75
                color: '#e53935'
              - value: -65
                color: '#fb8c00'
              - value: -55
                color: '#43a047'

      # Online-Status 24h: macht "wifi abgerissen" als rote Phase sichtbar
      - type: history-graph
        title: Online-Status 24h (rot = ESP offline)
        hours_to_show: 24
        entities:
          - entity: binary_sensor.solartracker_online

      # Bedienung (Webserver-Ersatz seit 05.06.2026, alles ueber cmnd/solar/*)
      - type: entities
        title: Bedienung
        show_header_toggle: false
        entities:
          - entity: input_number.solartracker_min_angle_setpoint
      - type: horizontal-stack
        cards:
          - type: button
            name: Hoch
            icon: mdi:arrow-up-bold
            tap_action:
              action: call-service
              service: script.solartracker_manual_up
          - type: button
            name: Runter
            icon: mdi:arrow-down-bold
            tap_action:
              action: call-service
              service: script.solartracker_manual_down
          - type: button
            name: Auto
            icon: mdi:autorenew
            tap_action:
              action: call-service
              service: script.solartracker_manual_auto
          - type: button
            name: Recalc
            icon: mdi:calculator
            tap_action:
              action: call-service
              service: script.solartracker_recalc

