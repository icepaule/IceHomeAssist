  # ===========================================================================
  # KOSTENANALYSE
  # ===========================================================================
  - title: Kostenanalyse
    path: kostenanalyse
    icon: mdi:chart-pie
    cards:

      # =====================================================================
      # Prognose-Karten
      # =====================================================================
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.stromkosten_heute
            name: Kosten Heute
            icon: mdi:cash
          - type: entity
            entity: sensor.stromkosten_hochrechnung_monat
            name: Prognose Monat
            icon: mdi:calendar-month
          - type: entity
            entity: sensor.stromkosten_hochrechnung_jahr
            name: Prognose Jahr
            icon: mdi:calendar

      # =====================================================================
      # Donut-Chart: Kostenverteilung nach Geraet (ct/h)
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Kostenverteilung aktuell (ct/h)
        chart_type: donut
        apex_config:
          chart:
            height: 300
          legend:
            show: true
            position: bottom
          plotOptions:
            pie:
              donut:
                labels:
                  show: true
                  total:
                    show: true
                    label: Gesamt
                    formatter: |
                      EVAL:function(w) {
                        var t = w.globals.seriesTotals.reduce(function(a,b){return a+b},0);
                        return t.toFixed(1) + ' ct/h';
                      }
        series:
          - entity: sensor.server_kosten_pro_stunde
            name: Server
            color: '#2196F3'
          - entity: sensor.kueche_kosten_pro_stunde
            name: Kueche
            color: '#FF9800'
          - entity: sensor.waschmaschine_kosten_pro_stunde
            name: Waschmaschine
            color: '#9C27B0'
          - entity: sensor.trockner_kosten_pro_stunde
            name: Trockner
            color: '#F44336'
          - entity: sensor.arbeitszimmer_kosten_pro_stunde
            name: Arbeitszimmer
            color: '#4CAF50'

      # =====================================================================
      # Balkendiagramm: Tageskosten letzte 7 Tage
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Tageskosten letzte 7 Tage (EUR)
        graph_span: 7d
        span:
          end: day
        apex_config:
          chart:
            height: 250
          plotOptions:
            bar:
              columnWidth: "60%"
              borderRadius: 4
          xaxis:
            labels:
              format: "dd.MM"
        series:
          - entity: sensor.tibber_pulse_paule_accumulated_cost
            type: column
            name: Tageskosten
            unit: " EUR"
            float_precision: 2
            statistics:
              type: max
              period: day
            color_threshold:
              - value: 0
                color: '#4CAF50'
              - value: 3
                color: '#8BC34A'
              - value: 5
                color: '#FFC107'
              - value: 7
                color: '#FF9800'
              - value: 10
                color: '#F44336'

      # =====================================================================
      # Stacked Area: Ueberwachter vs. sonstiger Verbrauch (24h)
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Ueberwachter vs. sonstiger Verbrauch (24h)
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        apex_config:
          chart:
            stacked: true
            height: 280
          tooltip:
            x:
              format: "HH:mm"
        yaxis:
          - min: 0
            apex_config:
              labels:
                formatter: |
                  EVAL:function(val) { return val.toFixed(0) + ' W'; }
        series:
          - entity: sensor.gesamtverbrauch_gemessen
            type: area
            name: Gemessen
            color: '#2196F3'
            stroke_width: 1
            opacity: 0.6
            group_by:
              func: avg
              duration: 15min
          - entity: sensor.sonstiger_verbrauch
            type: area
            name: Sonstiger
            color: '#FF5722'
            stroke_width: 1
            opacity: 0.6
            group_by:
              func: avg
              duration: 15min

      # =====================================================================
      # Kosten pro Stunde Heute (Preis x Verbrauch)
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Tatsaechliche Stundenkosten Heute (ct)
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        yaxis:
          - min: 0
            apex_config:
              labels:
                formatter: |
                  EVAL:function(val) { return val.toFixed(1) + ' ct'; }
        apex_config:
          chart:
            height: 250
          plotOptions:
            bar:
              columnWidth: "80%"
              borderRadius: 2
        series:
          - entity: sensor.tibber_pulse_paule_power
            type: column
            name: Stundenkosten
            unit: " ct"
            float_precision: 1
            statistics:
              type: mean
              period: hour
            data_generator: |
              const data = [];
              const now = new Date();
              const startOfDay = new Date(now);
              startOfDay.setHours(0,0,0,0);
              for (let h = 0; h <= now.getHours(); h++) {
                const t = new Date(startOfDay);
                t.setHours(h);
                const power = parseFloat(hass.states['sensor.tibber_pulse_paule_power']?.state) || 0;
                const price = parseFloat(hass.states['sensor.paule_current_electricity_price']?.state) || 0;
                const cost = (power / 1000) * price;
                data.push([t.getTime(), Math.round(cost * 10) / 10]);
              }
              return data;
            color_threshold:
              - value: 0
                color: '#4CAF50'
              - value: 10
                color: '#FFC107'
              - value: 20
                color: '#FF9800'
              - value: 30
                color: '#F44336'

      # =====================================================================
      # Heizkosten
      # =====================================================================
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.heizung_brenner_laufzeit_heute
            name: Brenner Heute
            icon: mdi:fire
            unit: "h"
          - type: entity
            entity: sensor.heizkosten_schaetzung_heute
            name: Heizkosten Heute
            icon: mdi:fire-circle

