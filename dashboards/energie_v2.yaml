title: Energie
views:
  # ===========================================================================
  # UEBERSICHT
  # ===========================================================================
  - title: Uebersicht
    path: uebersicht
    icon: mdi:flash
    cards:
      - type: markdown
        content: "## Energie Uebersicht"

      # Aktuelle Leistung
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.pv_leistung
            name: PV
            icon: mdi:solar-power
          - type: entity
            entity: sensor.tibber_pulse_paule_power
            name: Netz
            icon: mdi:transmission-tower

      # PV Gauge
      - type: gauge
        entity: sensor.pv_leistung
        name: PV Einspeisung
        min: 0
        max: 600
        severity:
          green: 300
          yellow: 100
          red: 0
        needle: true

      # Strompreis & Status
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.paule_current_electricity_price
            name: Strompreis
            unit: "ct/kWh"
          - type: entity
            entity: sensor.tibber_preis_status
            name: Status

      # Kosten heute
      - type: entity
        entity: sensor.tibber_pulse_paule_accumulated_cost
        name: Kosten Heute
        icon: mdi:cash-multiple

      # Verbraucher mit Kosten
      - type: entities
        title: Verbraucher (Leistung)
        show_header_toggle: false
        entities:
          - entity: sensor.server_leistung
            name: Server
            icon: mdi:server
          - entity: sensor.arbeitszimmer_leistung
            name: Arbeitszimmer
            icon: mdi:desk
          - entity: sensor.kueche_leistung
            name: Kueche
            icon: mdi:countertop
          - entity: sensor.waschmaschine_leistung
            name: Waschmaschine
            icon: mdi:washing-machine
          - entity: sensor.trockner_leistung
            name: Trockner
            icon: mdi:tumble-dryer
          - entity: sensor.spule_power
            name: Spuelmaschine
            icon: mdi:dishwasher

      # =====================================================================
      # Energie 24h: Gesamtverbrauch & PV-Anteil
      # =====================================================================
      - type: custom:mushroom-template-card
        primary: "Energiebilanz Heute"
        secondary: >-
          Gesamt {{ states('sensor.gesamtverbrauch_heute') }} kWh —
          {{ states('sensor.pv_anteil_heute') }}% aus PV
        icon: mdi:home-lightning-bolt
        icon_color: >-
          {% set p = states('sensor.pv_anteil_heute') | float(0) %}
          {% if p >= 50 %}green{% elif p >= 25 %}lime{% elif p >= 10 %}amber{% else %}grey{% endif %}
        fill_container: true

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.gesamtverbrauch_heute') }} kWh"
            secondary: Gesamtverbrauch
            icon: mdi:home-lightning-bolt
            icon_color: blue-grey
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.pv_eigenverbrauch_heute') }} kWh"
            secondary: "PV-Eigenverbrauch ({{ states('sensor.pv_anteil_heute') }}%)"
            icon: mdi:solar-power-variant
            icon_color: green
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.tibber_pulse_paule_accumulated_consumption') }} kWh"
            secondary: aus Netz gekauft
            icon: mdi:transmission-tower
            icon_color: red

      - type: custom:apexcharts-card
        header:
          show: true
          title: Energie 24h (Leistung — gestapelt = Gesamtverbrauch)
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          end: minute
        stacked: true
        yaxis:
          - min: 0
            apex_config:
              forceNiceScale: true
              title:
                text: W
        series:
          - entity: sensor.tibber_pulse_paule_power
            name: Netzbezug
            type: area
            color: "#ef5350"
            opacity: 0.55
            stroke_width: 2
            group_by:
              func: avg
              duration: 5min
          - entity: sensor.pv_eigenverbrauch_aktuell
            name: PV Eigenverbrauch
            type: area
            color: "#43a047"
            opacity: 0.6
            stroke_width: 2
            group_by:
              func: avg
              duration: 5min
          - entity: sensor.gesamtverbrauch_aktuell
            name: Gesamt (Linie)
            type: line
            color: "#37474f"
            stroke_width: 1
            show:
              in_chart: false
              legend_value: true

      - type: custom:apexcharts-card
        header:
          show: true
          title: Energie 24h (kWh Tagessumme)
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          end: day
        yaxis:
          - min: 0
            apex_config:
              title:
                text: kWh
        series:
          - entity: sensor.tibber_pulse_paule_accumulated_consumption
            name: Netzbezug
            type: area
            color: "#ef5350"
            stroke_width: 2
            opacity: 0.4
          - entity: sensor.pv_eigenverbrauch_heute
            name: PV Eigenverbrauch
            type: area
            color: "#43a047"
            stroke_width: 2
            opacity: 0.5
          - entity: sensor.gesamtverbrauch_heute
            name: Gesamt
            type: line
            color: "#37474f"
            stroke_width: 3

      # =====================================================================
      # Energie-Dashboard (migriert von /energy, damit man dort nicht mehr
      # hin muss) - native Cards, gleiche Daten wie Grid/Solar/Verbraucher-Prefs
      # =====================================================================
      - type: energy-date-selection

      - type: energy-distribution
        link_dashboard: true

      - type: energy-sources-table

      - type: energy-usage-graph

      # =====================================================================
      # Live-Watt Uebersicht (migriert von /live-strom)
      # =====================================================================
      - type: glance
        title: Aktuelle Leistung (Watt)
        show_state: true
        entities:
          - entity: sensor.waschmaschine_leistung
            name: Waschmaschine
          - entity: sensor.kueche_leistung
            name: Gefriertruhe
          - entity: sensor.arbeitszimmer_leistung
            name: Arbeitszimmer
          - entity: sensor.server_leistung
            name: Server
          - entity: sensor.trockner_leistung
            name: Trockner
          - entity: sensor.spule_power
            name: Spuelmaschine

      - type: history-graph
        title: Live-Verlauf letzte 24h
        hours_to_show: 24
        entities:
          - sensor.waschmaschine_leistung
          - sensor.kueche_leistung
          - sensor.arbeitszimmer_leistung
          - sensor.server_leistung
          - sensor.trockner_leistung
          - sensor.spule_power

  # ===========================================================================
  # STROMPREISE (mit tibber_prices HACS Sensoren)
  # ===========================================================================
  - title: Strompreise
    path: preise
    icon: mdi:currency-eur
    cards:

      # =====================================================================
      # 1. HEADER ROW: Aktueller Preis, Status, Kosten Heute
      # =====================================================================
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.paule_current_electricity_price
            name: Preis jetzt
            icon: mdi:currency-eur
            unit: "ct/kWh"
          - type: entity
            entity: sensor.tibber_preis_status
            name: Status
            icon: mdi:tag-outline
          - type: entity
            entity: sensor.tibber_pulse_paule_accumulated_cost
            name: Kosten heute
            icon: mdi:cash-multiple

      # =====================================================================
      # 2. CONDITIONAL RECOMMENDATIONS
      # =====================================================================
      - type: conditional
        conditions:
          - entity: sensor.tibber_preis_status
            state: "günstig"
        card:
          type: markdown
          content: |
            ### JETZT GUENSTIG
            Guter Zeitpunkt fuer Waschmaschine, Trockner oder Spuelmaschine!
            Aktueller Preis liegt unter dem Tagesdurchschnitt.

      - type: conditional
        conditions:
          - entity: sensor.tibber_preis_status
            state: "normal"
        card:
          type: markdown
          content: |
            ### NORMALER PREIS
            Preis ist im durchschnittlichen Bereich. Grosse Verbraucher
            besser auf guenstigere Zeiten verschieben, wenn moeglich.

      - type: conditional
        conditions:
          - entity: sensor.tibber_preis_status
            state: "teuer"
        card:
          type: markdown
          content: |
            ### AKTUELL TEUER
            Besser auf guenstigeren Zeitpunkt warten.
            Grosse Verbraucher moeglichst nicht jetzt einschalten!

      # =====================================================================
      # 3. PREISANALYSE HEUTE - Glance
      # =====================================================================
      - type: glance
        title: Preisanalyse Heute
        show_state: true
        entities:
          - entity: sensor.paule_today_s_lowest_price
            name: Min
            icon: mdi:arrow-down-bold
          - entity: sensor.tibber_durchschnittspreis_heute
            name: Durchschnitt
            icon: mdi:approximately-equal
          - entity: sensor.paule_today_s_highest_price
            name: Max
            icon: mdi:arrow-up-bold
          - entity: sensor.tibber_preis_ranking
            name: Ranking
            icon: mdi:percent-outline

      # =====================================================================
      # 4. BESTE & TEUERSTE ZEITEN - Entities Card
      # =====================================================================
      - type: entities
        title: Beste & Teuerste Zeiten
        show_header_toggle: false
        entities:
          - type: section
            label: Guenstigste Periode
          - entity: sensor.tibber_beste_zeit_start
            name: Beginn
            icon: mdi:clock-start
          - entity: sensor.tibber_beste_zeit_ende
            name: Ende
            icon: mdi:clock-end
          - entity: sensor.paule_best_price_starts_in
            name: Beginnt in (h)
            icon: mdi:timer-sand
          - entity: sensor.paule_best_price_remaining_time
            name: Restzeit (h)
            icon: mdi:timer-outline
          - type: section
            label: Teuerste Periode
          - entity: sensor.tibber_peak_zeit_start
            name: Beginn
            icon: mdi:clock-alert
          - entity: sensor.tibber_peak_zeit_ende
            name: Ende
            icon: mdi:clock-alert-outline

      - type: conditional
        conditions:
          - entity: binary_sensor.paule_best_price_period
            state: "on"
        card:
          type: markdown
          content: |
            ### BESTE PREISPERIODE AKTIV
            Jetzt ist die guenstigste Zeit! Grosse Verbraucher einschalten.

      - type: conditional
        conditions:
          - entity: binary_sensor.paule_peak_price_period
            state: "on"
        card:
          type: markdown
          content: |
            ### PEAK-PREISPERIODE AKTIV
            Aktuell ist die teuerste Periode. Verbrauch minimieren!

      # =====================================================================
      # 5. HAUPTCHART: Strompreis Heute (ct/kWh) - ApexCharts
      #    Historie: HACS tibber_prices Sensor (ct/kWh, 15min Intervalle)
      #    Prognose: Einzelstundenpreise aus kumulativen Durchschnitten
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Strompreis Heute (ct/kWh)
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
          label: Jetzt
          color: '#ffffff'
        yaxis:
          - min: 0
            apex_config:
              tickAmount: 6
              labels:
                formatter: |
                  EVAL:function(val) { return val.toFixed(1) + ' ct'; }
        apex_config:
          chart:
            height: 300
          tooltip:
            x:
              format: "HH:mm"
          plotOptions:
            bar:
              columnWidth: "90%"
              borderRadius: 2
        series:
          - entity: sensor.paule_current_electricity_price
            type: column
            name: Historie
            unit: " ct/kWh"
            float_precision: 1
            statistics:
              type: mean
              period: hour
            color_threshold:
              - value: 0
                color: '#4CAF50'
              - value: 25
                color: '#8BC34A'
              - value: 28
                color: '#CDDC39'
              - value: 30
                color: '#FFC107'
              - value: 33
                color: '#FF9800'
              - value: 36
                color: '#F44336'
          - entity: sensor.paule_current_electricity_price
            type: column
            name: Prognose
            unit: " ct/kWh"
            float_precision: 1
            data_generator: |
              const now = new Date();
              const h = now.getHours();
              const avg = [];
              for (let i = 1; i <= 5; i++) {
                const s = 'sensor.paule_price_next_' + i + 'h';
                avg.push(parseFloat(hass.states[s]?.state) || 0);
              }
              const hourly = [avg[0]];
              for (let i = 1; i < avg.length; i++) {
                hourly.push((i + 1) * avg[i] - i * avg[i - 1]);
              }
              return hourly.map((val, i) => {
                const t = new Date(now);
                t.setMinutes(0, 0, 0);
                t.setHours(h + 1 + i);
                return [t.getTime(), Math.round(val * 10) / 10];
              });
            color_threshold:
              - value: 0
                color: '#4CAF50'
              - value: 25
                color: '#8BC34A'
              - value: 28
                color: '#CDDC39'
              - value: 30
                color: '#FFC107'
              - value: 33
                color: '#FF9800'
              - value: 36
                color: '#F44336'

      # =====================================================================
      # 6. PREISPROGNOSE naechste 10 Stunden
      #    Kombination: Historie (vergangene Stunden) + Prognose (Zukunft)
      #    Einzelstundenpreise aus kumulativen price_next_Xh abgeleitet
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Preisprognose naechste 10 Stunden (ct/kWh)
        graph_span: 10h
        span:
          start: hour
        now:
          show: true
          label: Jetzt
        yaxis:
          - min: 0
            apex_config:
              tickAmount: 4
              labels:
                formatter: |
                  EVAL:function(val) { return val.toFixed(1) + ' ct'; }
        apex_config:
          chart:
            height: 250
          tooltip:
            x:
              format: "HH:mm"
          plotOptions:
            bar:
              columnWidth: "70%"
              borderRadius: 3
              dataLabels:
                position: top
          dataLabels:
            enabled: true
            formatter: |
              EVAL:function(val) { if (!val) return ''; return val.toFixed(1); }
            offsetY: -20
            style:
              fontSize: "11px"
              colors: ["#fff"]
          xaxis:
            labels:
              format: "HH:mm"
              datetimeUTC: false
        series:
          - entity: sensor.paule_current_electricity_price
            type: column
            name: Vergangen
            unit: " ct/kWh"
            float_precision: 1
            statistics:
              type: mean
              period: hour
            color_threshold:
              - value: 0
                color: '#4CAF50'
              - value: 25
                color: '#8BC34A'
              - value: 28
                color: '#CDDC39'
              - value: 30
                color: '#FFC107'
              - value: 33
                color: '#FF9800'
              - value: 36
                color: '#F44336'
          - entity: sensor.paule_current_electricity_price
            type: column
            name: Prognose
            unit: " ct/kWh"
            float_precision: 1
            data_generator: |
              const now = new Date();
              const h = now.getHours();
              const cur = parseFloat(hass.states['sensor.paule_current_electricity_price']?.state) || 0;
              const avg = [];
              for (let i = 1; i <= 5; i++) {
                avg.push(parseFloat(hass.states['sensor.paule_price_next_' + i + 'h']?.state) || 0);
              }
              const hourly = [cur, avg[0]];
              for (let i = 1; i < avg.length; i++) {
                hourly.push((i + 1) * avg[i] - i * avg[i - 1]);
              }
              return hourly.map((val, i) => {
                const t = new Date(now);
                t.setMinutes(0, 0, 0);
                t.setHours(h + i);
                return [t.getTime(), Math.round(val * 10) / 10];
              });
            color_threshold:
              - value: 0
                color: '#4CAF50'
              - value: 25
                color: '#8BC34A'
              - value: 28
                color: '#CDDC39'
              - value: 30
                color: '#FFC107'
              - value: 33
                color: '#FF9800'
              - value: 36
                color: '#F44336'

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.paule_current_price_trend
            name: Preistrend
            icon: mdi:trending-up
          - type: entity
            entity: sensor.paule_today_s_price_level
            name: Bewertung Heute
            icon: mdi:star-outline

      # =====================================================================
      # 7. MORGEN - Conditional (nur wenn Daten verfuegbar)
      # =====================================================================
      - type: conditional
        conditions:
          - entity: binary_sensor.paule_tomorrow_s_data_available
            state: "on"
        card:
          type: vertical-stack
          cards:
            - type: glance
              title: Preisanalyse Morgen
              show_state: true
              entities:
                - entity: sensor.paule_tomorrow_s_lowest_price
                  name: Min
                  icon: mdi:arrow-down-bold
                - entity: sensor.paule_price_tomorrow
                  name: Durchschnitt
                  icon: mdi:approximately-equal
                - entity: sensor.paule_tomorrow_s_highest_price
                  name: Max
                  icon: mdi:arrow-up-bold
                - entity: sensor.paule_tomorrow_s_price_level
                  name: Bewertung
                  icon: mdi:star-outline

      # Morgen Stundenchart (nur wenn Daten verfuegbar)
      - type: conditional
        conditions:
          - entity: binary_sensor.paule_tomorrow_s_data_available
            state: "on"
        card:
          type: custom:apexcharts-card
          header:
            show: true
            title: Strompreise Morgen (ct/kWh)
          graph_span: 24h
          span:
            start: day
            offset: "+1d"
          yaxis:
            - min: 0
              apex_config:
                tickAmount: 6
                labels:
                  formatter: |
                    EVAL:function(val) { return val.toFixed(1) + ' ct'; }
          apex_config:
            chart:
              height: 250
            plotOptions:
              bar:
                columnWidth: "80%"
                borderRadius: 2
            xaxis:
              labels:
                format: "HH:mm"
          series:
            - entity: sensor.paule_price_tomorrow
              type: column
              name: Morgen
              unit: " ct/kWh"
              float_precision: 1
              data_generator: |
                const prices = hass.states['sensor.paule_price_tomorrow']?.attributes?.prices || [];
                return prices.map(function(p) {
                  return [new Date(p.start).getTime(), p.price];
                });
              color_threshold:
                - value: 0
                  color: '#4CAF50'
                - value: 25
                  color: '#8BC34A'
                - value: 28
                  color: '#CDDC39'
                - value: 30
                  color: '#FFC107'
                - value: 33
                  color: '#FF9800'
                - value: 36
                  color: '#F44336'

      # Fallback: Morgen noch nicht verfuegbar
      - type: conditional
        conditions:
          - entity: binary_sensor.paule_tomorrow_s_data_available
            state: "off"
        card:
          type: markdown
          content: |
            ### Morgen
            Preisdaten fuer morgen sind noch nicht verfuegbar.
            Tibber veroeffentlicht die Preise taeglich gegen 13:00 Uhr.

      # =====================================================================
      # 8. NETZVERBRAUCH & PREIS HEUTE - Dual-Axis ApexChart
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Netzverbrauch & Preis Heute
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        yaxis:
          - id: power
            min: 0
            apex_config:
              labels:
                formatter: |
                  EVAL:function(val) { return val.toFixed(0) + ' W'; }
          - id: price
            opposite: true
            min: 0
            apex_config:
              labels:
                formatter: |
                  EVAL:function(val) { return val.toFixed(1) + ' ct'; }
        apex_config:
          chart:
            height: 280
          tooltip:
            x:
              format: "HH:mm"
        series:
          - entity: sensor.tibber_pulse_paule_power
            type: area
            name: Netzverbrauch
            yaxis_id: power
            color: '#2196F3'
            stroke_width: 2
            opacity: 0.25
            unit: " W"
            group_by:
              func: avg
              duration: 15min
          - entity: sensor.paule_current_electricity_price
            type: line
            name: Preis
            yaxis_id: price
            color: '#FF9800'
            stroke_width: 2
            unit: " ct/kWh"
            group_by:
              func: avg
              duration: 1h

      # =====================================================================
      # 9. VERBRAUCHER LEISTUNG HEUTE - Stacked Area
      # =====================================================================
      - type: custom:apexcharts-card
        header:
          show: true
          title: Verbraucher Leistung Heute
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        yaxis:
          - id: power
            min: 0
        apex_config:
          chart:
            stacked: true
            height: 280
          tooltip:
            x:
              format: "HH:mm"
        series:
          - entity: sensor.server_leistung
            type: area
            name: Server
            color: '#2196F3'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7
          - entity: sensor.arbeitszimmer_leistung
            type: area
            name: Arbeitszimmer
            color: '#4CAF50'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7
          - entity: sensor.kueche_leistung
            type: area
            name: Kueche
            color: '#FF9800'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7
          - entity: sensor.waschmaschine_leistung
            type: area
            name: Waschmaschine
            color: '#9C27B0'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7
          - entity: sensor.trockner_leistung
            type: area
            name: Trockner
            color: '#F44336'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7

      # =====================================================================
      # 10. KOSTEN & VERBRAUCH - Entities
      # =====================================================================
      - type: entities
        title: Kosten & Verbrauch
        show_header_toggle: false
        entities:
          - type: section
            label: Heute
          - entity: sensor.tibber_pulse_paule_accumulated_cost
            name: Kosten Heute
            icon: mdi:cash-multiple
          - entity: sensor.tibber_pulse_paule_accumulated_consumption
            name: Verbrauch Heute (kWh)
            icon: mdi:flash
          - entity: sensor.tibber_pulse_paule_average_power
            name: Durchschnitt Leistung
            icon: mdi:speedometer
          - entity: sensor.tibber_pulse_paule_min_power
            name: Min Leistung
            icon: mdi:speedometer-slow
          - entity: sensor.tibber_pulse_paule_max_power
            name: Max Leistung
            icon: mdi:speedometer
          - type: section
            label: Monat
          - entity: sensor.paule_monthly_cost
            name: Kosten Monat
            icon: mdi:calendar-month
          - entity: sensor.paule_monthly_net_consumption
            name: Verbrauch Monat (kWh)
            icon: mdi:calendar-month

  # ===========================================================================
  # BESTE ZEITEN & SPAR-TIPPS
  # ===========================================================================
  - title: Beste Zeiten
    path: beste-zeiten
    icon: mdi:star
    cards:
      - type: markdown
        content: |
          ## Beste Zeiten fuer Grossverbraucher

      # Preisuebersicht
      - type: glance
        title: Preisbereich Heute
        entities:
          - entity: sensor.tibber_gunstigster_preis_heute
            name: Min
          - entity: sensor.tibber_durchschnittspreis_heute
            name: Durchschnitt
