title: Energie
views:
  # ===========================================================================
  # ÜBERSICHT
  # ===========================================================================
  - title: Übersicht
    path: uebersicht
    icon: mdi:flash
    cards:
      - type: markdown
        content: "## ⚡ Energie Übersicht"

      # Aktuelle Leistung
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.pv_leistung
            name: "☀️ PV"
            icon: mdi:solar-power
          - type: entity
            entity: sensor.tibber_pulse_paule_power
            name: "🏠 Netz"
            icon: mdi:transmission-tower

      # PV Gauge
      - type: gauge
        entity: sensor.pv_leistung
        name: PV Einspeisung
        min: 0
        max: 600
        severity:
          green: 300
          yellow: 100
          red: 0
        needle: true

      # Strompreis & Status
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.tibber_prices
            name: Strompreis
            unit: "€/kWh"
          - type: entity
            entity: sensor.tibber_preis_status
            name: Status

      # Kosten heute
      - type: entity
        entity: sensor.tibber_pulse_paule_accumulated_cost
        name: "💶 Kosten Heute"
        icon: mdi:cash-multiple

      # Verbraucher mit Kosten
      - type: entities
        title: Verbraucher (Leistung)
        show_header_toggle: false
        entities:
          - entity: sensor.server_leistung
            name: Server
            icon: mdi:server
          - entity: sensor.arbeitszimmer_leistung
            name: Arbeitszimmer
            icon: mdi:desk
          - entity: sensor.kueche_leistung
            name: Küche
            icon: mdi:countertop
          - entity: sensor.waschmaschine_leistung
            name: Waschmaschine
            icon: mdi:washing-machine
          - entity: sensor.trockner_leistung
            name: Trockner
            icon: mdi:tumble-dryer

      # PV Graph
      - type: history-graph
        title: Energie 24h
        hours_to_show: 24
        entities:
          - entity: sensor.pv_leistung
            name: PV Erzeugung
          - entity: sensor.tibber_pulse_paule_power
            name: Netzverbrauch

  # ===========================================================================
  # STROMPREISE & KOSTEN (Tibber Dashboard)
  # ===========================================================================
  - title: Preise
    path: preise
    icon: mdi:currency-eur
    cards:
      # ----- Aktueller Preis & Tageskosten -----
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.tibber_preis_aktuell
            name: Preis jetzt
            icon: mdi:currency-eur
          - type: entity
            entity: sensor.tibber_preis_status
            name: Status
          - type: entity
            entity: sensor.tibber_pulse_paule_accumulated_cost
            name: Kosten heute
            icon: mdi:cash-multiple

      # Preis-Analyse Heute
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.tibber_durchschnittspreis_heute
            name: Schnitt
          - type: entity
            entity: sensor.tibber_gunstigster_preis_heute
            name: Min
          - type: entity
            entity: sensor.tibber_teuerster_preis_heute
            name: Max

      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.tibber_gunstigste_stunde_heute
            name: Billigste Std
          - type: entity
            entity: sensor.tibber_teuerste_stunde_heute
            name: Teuerste Std
          - type: entity
            entity: sensor.tibber_gunstige_stunden_heute
            name: Billige Std

      # Empfehlung günstig
      - type: conditional
        conditions:
          - entity: sensor.tibber_preis_status
            state: "günstig"
        card:
          type: markdown
          content: |
            ### JETZT GÜNSTIG
            Guter Zeitpunkt für Waschmaschine, Trockner oder Spülmaschine!

      # Empfehlung teuer
      - type: conditional
        conditions:
          - entity: sensor.tibber_preis_status
            state: "teuer"
        card:
          type: markdown
          content: |
            ### AKTUELL TEUER
            Besser auf günstigeren Zeitpunkt warten.

      # ----- Preischart Heute + Morgen -----
      - type: custom:apexcharts-card
        header:
          show: true
          title: Strompreise Heute & Morgen (ct/kWh)
          show_states: false
        graph_span: 48h
        span:
          start: day
        now:
          show: true
          label: Jetzt
        yaxis:
          - min: 0
            apex_config:
              tickAmount: 6
        series:
          - entity: sensor.tibber_prices
            type: column
            name: Strompreis
            float_precision: 1
            unit: " ct/kWh"
            data_generator: |
              const today = entity.attributes.today || [];
              const tomorrow = entity.attributes.tomorrow || [];
              const all = [...today, ...tomorrow];
              return all.map((item) => {
                const time = new Date(item.startsAt).getTime();
                const price = item.total * 100;
                return [time, price];
              });
            color_threshold:
              - value: 0
                color: '#4CAF50'
              - value: 20
                color: '#8BC34A'
              - value: 25
                color: '#FFC107'
              - value: 30
                color: '#FF9800'
              - value: 35
                color: '#F44336'

      # Morgen Durchschnitt (falls verfügbar)
      - type: conditional
        conditions:
          - entity: sensor.tibber_durchschnittspreis_morgen
            state_not: "unavailable"
        card:
          type: entity
          entity: sensor.tibber_durchschnittspreis_morgen
          name: Durchschnittspreis Morgen
          icon: mdi:calendar-arrow-right

      # ----- Netzverbrauch Heute (Stündlich) -----
      - type: custom:apexcharts-card
        header:
          show: true
          title: Netzverbrauch & Preis Heute
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        yaxis:
          - id: power
            min: 0
          - id: price
            opposite: true
            min: 0
        series:
          - entity: sensor.tibber_pulse_paule_power
            type: area
            name: Netzverbrauch
            yaxis_id: power
            color: '#2196F3'
            stroke_width: 2
            opacity: 0.3
            unit: " W"
            group_by:
              func: avg
              duration: 1h
          - entity: sensor.tibber_preis_aktuell
            type: line
            name: Preis
            yaxis_id: price
            color: '#FF9800'
            stroke_width: 2
            unit: " ct/kWh"
            group_by:
              func: avg
              duration: 1h

      # ----- Verbraucher Heute (Stacked) -----
      - type: custom:apexcharts-card
        header:
          show: true
          title: Verbraucher Leistung Heute
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
        yaxis:
          - id: power
            min: 0
        apex_config:
          chart:
            stacked: true
        series:
          - entity: sensor.server_leistung
            type: area
            name: Server
            color: '#2196F3'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7
          - entity: sensor.arbeitszimmer_leistung
            type: area
            name: Arbeitszimmer
            color: '#4CAF50'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7
          - entity: sensor.kueche_leistung
            type: area
            name: Küche
            color: '#FF9800'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7
          - entity: sensor.waschmaschine_leistung
            type: area
            name: Waschmaschine
            color: '#9C27B0'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7
          - entity: sensor.trockner_leistung
            type: area
            name: Trockner
            color: '#F44336'
            group_by:
              func: avg
              duration: 1h
            stroke_width: 1
            opacity: 0.7

      # ----- Verbraucher Detail Heute -----
      - type: entities
        title: Verbraucher Heute
        show_header_toggle: false
        entities:
          - type: section
            label: Verbrauch (kWh) / Kosten Heute (ct) / Kosten aktuell (ct/h)
          - entity: sensor.server_energie_heute
            name: Server (kWh)
            icon: mdi:server
          - entity: sensor.server_kosten_heute
            name: Server Kosten heute
            icon: mdi:cash
          - entity: sensor.server_kosten_pro_stunde
            name: Server aktuell ct/h
            icon: mdi:cash-clock
          - type: divider
          - entity: sensor.arbeitszimmer_energie_heute
            name: Arbeitszimmer (kWh)
            icon: mdi:desk
          - entity: sensor.arbeitszimmer_kosten_heute
            name: Arbeitszimmer Kosten heute
            icon: mdi:cash
          - entity: sensor.arbeitszimmer_kosten_pro_stunde
            name: Arbeitszimmer aktuell ct/h
            icon: mdi:cash-clock
          - type: divider
          - entity: sensor.kueche_energie_heute
            name: Küche (kWh)
            icon: mdi:countertop
          - entity: sensor.kuche_kosten_heute
            name: Küche Kosten heute
            icon: mdi:cash
          - entity: sensor.kuche_kosten_pro_stunde
            name: Küche aktuell ct/h
            icon: mdi:cash-clock
          - type: divider
          - entity: sensor.waschmaschine_energie_heute
            name: Waschmaschine (kWh)
            icon: mdi:washing-machine
          - entity: sensor.waschmaschine_kosten_heute
            name: Waschmaschine Kosten heute
            icon: mdi:cash
          - entity: sensor.waschmaschine_kosten_pro_stunde
            name: Waschmaschine aktuell ct/h
            icon: mdi:cash-clock
          - type: divider
          - entity: sensor.trockner_energie_heute
            name: Trockner (kWh)
            icon: mdi:tumble-dryer
          - entity: sensor.trockner_kosten_heute
            name: Trockner Kosten heute
            icon: mdi:cash
          - entity: sensor.trockner_kosten_pro_stunde
            name: Trockner aktuell ct/h
            icon: mdi:cash-clock

      # ----- PV Erzeugung (kein Verbraucher!) -----
      - type: entities
        title: PV Erzeugung (kein Verbraucher)
        show_header_toggle: false
        entities:
          - entity: sensor.pv_leistung
            name: Aktuelle Leistung
            icon: mdi:solar-power
          - entity: sensor.pv_ersparnis_pro_stunde
            name: Aktuelle Ersparnis/h
            icon: mdi:piggy-bank
          - type: divider
          - entity: sensor.pv_energie_heute
            name: Erzeugt Heute
            icon: mdi:solar-power
          - entity: sensor.pv_erzeugung_monat
            name: Erzeugt Monat
            icon: mdi:calendar-month
          - entity: sensor.pv_erzeugung_jahr
            name: Erzeugt Jahr
            icon: mdi:calendar
          - entity: sensor.pv_energie_gesamt
            name: Erzeugt Gesamt
            icon: mdi:counter

      # ----- Kosten Übersicht -----
      - type: entities
        title: Kosten & Verbrauch Netz
        show_header_toggle: false
        entities:
          - entity: sensor.tibber_pulse_paule_accumulated_cost
            name: Kosten Heute
            icon: mdi:cash-multiple
          - entity: sensor.tibber_pulse_paule_accumulated_consumption
            name: Verbrauch Heute (kWh)
            icon: mdi:flash
          - entity: sensor.paule_monthly_cost
            name: Kosten Monat
            icon: mdi:cash-multiple
          - entity: sensor.paule_monthly_net_consumption
            name: Verbrauch Monat (kWh)
            icon: mdi:flash

      # ----- Historisch: Tagesverbrauch pro Verbraucher (7 Tage) -----
      - type: statistics-graph
        title: Verbrauch pro Tag - 7 Tage (kWh)
        period: day
        days_to_show: 7
        stat_types:
          - change
        chart_type: bar
        entities:
          - entity: sensor.server_energie_gesamt
            name: Server
          - entity: sensor.arbeitszimmer_energie_gesamt
            name: Arbeitszimmer
          - entity: sensor.kueche_energie_gesamt
            name: Küche
          - entity: sensor.waschmaschine_energie_gesamt
            name: Waschmaschine
          - entity: sensor.trockner_energie_gesamt
            name: Trockner

      # ----- Historisch: Wochenverbrauch (4 Wochen) -----
      - type: statistics-graph
        title: Verbrauch pro Woche - 4 Wochen (kWh)
        period: week
        days_to_show: 28
        stat_types:
          - change
        chart_type: bar
        entities:
          - entity: sensor.server_energie_gesamt
            name: Server
          - entity: sensor.arbeitszimmer_energie_gesamt
            name: Arbeitszimmer
          - entity: sensor.kueche_energie_gesamt
            name: Küche
          - entity: sensor.waschmaschine_energie_gesamt
            name: Waschmaschine
          - entity: sensor.trockner_energie_gesamt
            name: Trockner

      # ----- Historisch: Monatsverbrauch (12 Monate) -----
      - type: statistics-graph
        title: Verbrauch pro Monat - 12 Monate (kWh)
        period: month
        days_to_show: 365
        stat_types:
          - change
        chart_type: bar
        entities:
          - entity: sensor.server_energie_gesamt
            name: Server
          - entity: sensor.arbeitszimmer_energie_gesamt
            name: Arbeitszimmer
          - entity: sensor.kueche_energie_gesamt
            name: Küche
          - entity: sensor.waschmaschine_energie_gesamt
            name: Waschmaschine
          - entity: sensor.trockner_energie_gesamt
            name: Trockner

      # ----- Historisch: Netz + PV (Stacked) -----
      - type: custom:apexcharts-card
        header:
          show: true
          title: Netz & PV - 7 Tage (kWh)
        graph_span: 7d
        span:
          end: day
        apex_config:
          chart:
            stacked: true
        series:
          - entity: sensor.tibber_pulse_paule_accumulated_consumption
            type: column
            name: Netzverbrauch
            color: '#2196F3'
            statistics:
              type: change
              period: day
          - entity: sensor.pv_energie_gesamt
            type: column
            name: PV Erzeugung
            color: '#4CAF50'
            statistics:
              type: change
              period: day

      - type: custom:apexcharts-card
        header:
          show: true
          title: Netz & PV - 12 Monate (kWh)
        graph_span: 365d
        span:
          end: month
        apex_config:
          chart:
            stacked: true
        series:
          - entity: sensor.tibber_pulse_paule_accumulated_consumption
            type: column
            name: Netzverbrauch
            color: '#2196F3'
            statistics:
              type: change
              period: month
          - entity: sensor.pv_energie_gesamt
            type: column
            name: PV Erzeugung
            color: '#4CAF50'
            statistics:
              type: change
              period: month

      # ----- Einstellungen -----
      - type: entities
        title: Einstellungen
        show_header_toggle: false
        entities:
          - entity: input_number.strompreis_schwelle
            name: Schwelle günstiger Strom (ct/kWh)
          - entity: input_boolean.guenstiger_strom_benachrichtigung
            name: Preisbenachrichtigungen
          - entity: input_boolean.waschmaschine_warten
            name: Waschmaschine auf günstigen Strom
          - entity: input_boolean.trockner_warten
            name: Trockner auf günstigen Strom
          - entity: input_boolean.spuelmaschine_warten
            name: Spülmaschine auf günstigen Strom

  # ===========================================================================
  # BESTE ZEITEN & SPAR-TIPPS
  # ===========================================================================
  - title: Beste Zeiten
    path: beste-zeiten
    icon: mdi:star
    cards:
      - type: markdown
        content: |
          ## Beste Zeiten für Großverbraucher

      # Preisübersicht
      - type: glance
        title: Preisbereich Heute
        entities:
          - entity: sensor.tibber_gunstigster_preis_heute
            name: Min
          - entity: sensor.tibber_durchschnittspreis_heute
            name: Durchschnitt
          - entity: sensor.tibber_teuerster_preis_heute
            name: Max

      - type: horizontal-stack
        cards:
          - entity: sensor.tibber_gunstigste_stunde_heute
            name: Billigste Stunde
            type: entity
          - entity: sensor.tibber_teuerste_stunde_heute
            name: Teuerste Stunde
            type: entity

      # Waschmaschine
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ### Waschmaschine
              Typischer Verbrauch: 1-2 kWh / Dauer: ca. 2h
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.waschmaschine_leistung
                name: Leistung
              - type: entity
                entity: switch.strom_waschmaschine
                name: Schalter

      # Trockner
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ### Trockner
              Typischer Verbrauch: 2-4 kWh / Dauer: ca. 2-3h
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.trockner_leistung
                name: Leistung
              - type: entity
                entity: switch.strom_trockner
                name: Schalter

      # Spar-Tipps
      - type: markdown
        content: |
          ### Spar-Tipps

          1. **PV-Strom nutzen**: Tagsüber (10-15 Uhr) bei Sonne
          2. **Günstige Nachtzeiten**: Oft 22:00 - 06:00
          3. **Wochenende**: Preise oft niedriger als werktags
          4. **Timer nutzen**: Verzögerten Start programmieren

      # Steuerung
      - type: entities
        title: Automatische Steuerung
        show_header_toggle: false
        entities:
          - entity: input_boolean.waschmaschine_warten
            name: Waschmaschine auf günstigen Strom warten
          - entity: input_boolean.trockner_warten
            name: Trockner auf günstigen Strom warten
          - entity: input_boolean.spuelmaschine_warten
            name: Spülmaschine auf günstigen Strom warten

  # ===========================================================================
  # PV ANLAGE
  # ===========================================================================
  - title: PV Anlage
    path: pv
    icon: mdi:solar-power
    cards:
      - type: markdown
        content: "## ☀️ Photovoltaik"

      - type: gauge
        entity: sensor.pv_leistung
        name: Aktuelle Einspeisung
        min: 0
        max: 600
        severity:
          green: 400
          yellow: 200
          red: 0

      - type: entities
        title: Live Daten
        entities:
          - entity: sensor.pv_leistung
            name: Leistung
          - entity: sensor.pv_spannung
            name: Spannung
          - entity: sensor.pv_strom
            name: Strom
          - entity: switch.strom_pv
            name: Schalter

      - type: entities
        title: Energie
        entities:
          - entity: sensor.pv_energie_heute
            name: Heute
          - entity: sensor.pv_energie_gestern
            name: Gestern
          - entity: sensor.pv_energie_gesamt
            name: Gesamt

      - type: entity
        entity: sensor.pv_ersparnis_pro_stunde
        name: "💰 Ersparnis pro Stunde"

      - type: history-graph
        title: Leistungsverlauf (48h)
        hours_to_show: 48
        entities:
          - entity: sensor.pv_leistung

  # ===========================================================================
  # VERBRAUCHER
  # ===========================================================================
  - title: Verbraucher
    path: verbraucher
    icon: mdi:power-plug
    cards:
      - type: markdown
        content: "## 🔌 Stromverbraucher"

      # Server
      - type: vertical-stack
        cards:
          - type: markdown
            content: "### 🖥️ Server"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.server_leistung
                name: Leistung
              - type: entity
                entity: sensor.server_energie_heute
                name: Heute
          - type: entity
            entity: sensor.server_kosten_pro_stunde
            name: Kosten/h

      # Arbeitszimmer
      - type: vertical-stack
        cards:
          - type: markdown
            content: "### 🖥️ Arbeitszimmer"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.arbeitszimmer_leistung
                name: Leistung
              - type: entity
                entity: sensor.arbeitszimmer_energie_heute
                name: Heute
          - type: entity
            entity: sensor.arbeitszimmer_kosten_pro_stunde
            name: Kosten/h
          - type: entity
            entity: switch.strom_arbeitszimmer
            name: Schalter

      # Waschmaschine
      - type: vertical-stack
        cards:
          - type: markdown
            content: "### 🧺 Waschmaschine"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.waschmaschine_leistung
                name: Leistung
              - type: entity
                entity: switch.strom_waschmaschine
                name: Schalter
          - type: entity
            entity: sensor.waschmaschine_kosten_pro_stunde
            name: Kosten/h

      # Trockner
      - type: vertical-stack
        cards:
          - type: markdown
            content: "### 🌀 Trockner"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.trockner_leistung
                name: Leistung
              - type: entity
                entity: switch.strom_trockner
                name: Schalter
          - type: entity
            entity: sensor.trockner_kosten_pro_stunde
            name: Kosten/h

      # Küche
      - type: vertical-stack
        cards:
          - type: markdown
            content: "### 🍳 Küche"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.kueche_leistung
                name: Leistung
              - type: entity
                entity: sensor.kueche_energie_heute
                name: Heute
          - type: entity
            entity: sensor.kuche_kosten_pro_stunde
            name: Kosten/h

      # History
      - type: history-graph
        title: Verbrauch 24h
        hours_to_show: 24
        entities:
          - entity: sensor.server_leistung
            name: Server
          - entity: sensor.arbeitszimmer_leistung
            name: Arbeitszimmer

  # ===========================================================================
  # STATISTIK
  # ===========================================================================
  - title: Statistik
    path: statistik
    icon: mdi:chart-line
    cards:
      - type: markdown
        content: "## 📊 Energie Statistik"

      # Energie Heute
      - type: entities
        title: Energie Heute (kWh)
        entities:
          - entity: sensor.pv_energie_heute
            name: "☀️ PV Erzeugt"
          - entity: sensor.tibber_pulse_paule_accumulated_consumption
            name: "🏠 Netz Bezug"
          - entity: sensor.server_energie_heute
            name: "🖥️ Server"
          - entity: sensor.arbeitszimmer_energie_heute
            name: "🖥️ Arbeitszimmer"
          - entity: sensor.waschmaschine_energie_heute
            name: "🧺 Waschmaschine"
          - entity: sensor.trockner_energie_heute
            name: "🌀 Trockner"

      # Kosten
      - type: entities
        title: Kosten
        entities:
          - entity: sensor.tibber_pulse_paule_accumulated_cost
            name: "💶 Heute"
          - entity: sensor.paule_monthly_cost
            name: "💶 Diesen Monat"

      # Energie Gesamt
      - type: entities
        title: Energie Gesamt (kWh)
        entities:
          - entity: sensor.pv_energie_gesamt
            name: "☀️ PV Erzeugt"
          - entity: sensor.server_energie_gesamt
            name: "🖥️ Server"
