      unique_id: meshtastic_mesh_info
      state_topic: "meshtastic/mesh_info"
      value_template: "{{ value_json.total_nodes }}"
      json_attributes_topic: "meshtastic/mesh_info"
      json_attributes_template: "{{ value_json | tojson }}"
      icon: mdi:information-outline

# -----------------------------------------------------------------------------
# Template Sensors
# -----------------------------------------------------------------------------
template:
  - sensor:
      - name: "Mesh GW Uptime Text"
        unique_id: meshtastic_gw_uptime_text
        state: >-
          {% set s = states('sensor.mesh_gw_uptime') | int(0) %}
          {% set d = (s / 86400) | int %}
          {% set h = ((s % 86400) / 3600) | int %}
          {% set m = ((s % 3600) / 60) | int %}
          {% if d > 0 %}{{ d }}d {{ h }}h {{ m }}m
          {% elif h > 0 %}{{ h }}h {{ m }}m
          {% else %}{{ m }}m{% endif %}
        icon: mdi:clock-outline

      - name: "Mesh Supreme Uptime Text"
        unique_id: meshtastic_supreme_uptime_text
        state: >-
          {% set s = states('sensor.mesh_supreme_uptime') | int(0) %}
          {% set d = (s / 86400) | int %}
          {% set h = ((s % 86400) / 3600) | int %}
          {% set m = ((s % 3600) / 60) | int %}
          {% if d > 0 %}{{ d }}d {{ h }}h {{ m }}m
          {% elif h > 0 %}{{ h }}h {{ m }}m
          {% else %}{{ m }}m{% endif %}
        icon: mdi:clock-outline

      - name: "Mesh Deck Uptime Text"
        unique_id: meshtastic_deck_uptime_text
        state: >-
          {% set s = states('sensor.mesh_deck_uptime') | int(0) %}
          {% set d = (s / 86400) | int %}
          {% set h = ((s % 86400) / 3600) | int %}
          {% set m = ((s % 3600) / 60) | int %}
          {% if d > 0 %}{{ d }}d {{ h }}h {{ m }}m
          {% elif h > 0 %}{{ h }}h {{ m }}m
          {% else %}{{ m }}m{% endif %}
        icon: mdi:clock-outline

      - name: "Mesh OTN Uptime Text"
        unique_id: meshtastic_otn_uptime_text
        state: >-
          {% set s = states('sensor.mesh_otn_uptime') | int(0) %}
          {% set d = (s / 86400) | int %}
          {% set h = ((s % 86400) / 3600) | int %}
          {% set m = ((s % 3600) / 60) | int %}
          {% if d > 0 %}{{ d }}d {{ h }}h {{ m }}m
          {% elif h > 0 %}{{ h }}h {{ m }}m
          {% else %}{{ m }}m{% endif %}
        icon: mdi:clock-outline

      - name: "Mesh Aktive Nodes"
        unique_id: meshtastic_active_nodes
        state: >-
          {% set gw = states('sensor.mesh_gw_battery') not in ['unknown', 'unavailable'] %}
          {% set sup = states('sensor.mesh_supreme_battery') not in ['unknown', 'unavailable'] %}
          {% set deck = states('sensor.mesh_deck_battery') not in ['unknown', 'unavailable'] %}
          {% set otn = states('sensor.mesh_otn_battery') not in ['unknown', 'unavailable'] %}
          {{ [gw, sup, deck, otn] | select('true') | list | count }}/4
        icon: mdi:radio-tower

      - name: "Mesh Total Nodes"
        unique_id: meshtastic_total_nodes
        state: >-
          {{ state_attr('sensor.mesh_info', 'total_nodes') | default(0) }}
        icon: mdi:account-group

      - name: "Mesh LoRa Region"
        unique_id: meshtastic_lora_region
        state: >-
          {% set r = state_attr('sensor.mesh_info', 'lora') %}
          {{ r.region | default('?') if r else '?' }}
        icon: mdi:earth

      - name: "Mesh LoRa Preset"
        unique_id: meshtastic_lora_preset
        state: >-
          {% set r = state_attr('sensor.mesh_info', 'lora') %}
          {{ r.modem_preset | default('?') if r else '?' }}
        icon: mdi:tune

      - name: "Mesh LoRa Hop Limit"
        unique_id: meshtastic_lora_hop_limit
        state: >-
          {% set r = state_attr('sensor.mesh_info', 'lora') %}
          {{ r.hop_limit | default(3) if r else 3 }}
        icon: mdi:transit-connection-horizontal

      - name: "Mesh LoRa TX Power"
        unique_id: meshtastic_lora_tx_power
        state: >-
          {% set r = state_attr('sensor.mesh_info', 'lora') %}
          {{ r.tx_power | default(0) if r else 0 }}
        unit_of_measurement: "dBm"
        icon: mdi:flash

      - name: "Mesh GW Last Heard"
        unique_id: meshtastic_gw_last_heard
        state: >-
          {% set info = state_attr('sensor.mesh_info', 'own_nodes') %}
          {% if info and info.GW and info.GW.last_heard %}
            {{ info.GW.last_heard | int | timestamp_local }}
          {% else %}unbekannt{% endif %}
        icon: mdi:clock-check-outline

      - name: "Mesh Supreme Last Heard"
        unique_id: meshtastic_supreme_last_heard
        state: >-
          {% set info = state_attr('sensor.mesh_info', 'own_nodes') %}
          {% if info and info.Supreme and info.Supreme.last_heard %}
            {{ info.Supreme.last_heard | int | timestamp_local }}
          {% else %}unbekannt{% endif %}
        icon: mdi:clock-check-outline

      - name: "Mesh Deck Last Heard"
        unique_id: meshtastic_deck_last_heard
        state: >-
          {% set info = state_attr('sensor.mesh_info', 'own_nodes') %}
          {% if info and info.IceDeck and info.IceDeck.last_heard %}
            {{ info.IceDeck.last_heard | int | timestamp_local }}
          {% else %}unbekannt{% endif %}
        icon: mdi:clock-check-outline

      - name: "Mesh OTN Last Heard"
        unique_id: meshtastic_otn_last_heard
        state: >-
          {% set info = state_attr('sensor.mesh_info', 'own_nodes') %}
          {% if info and info.OTN and info.OTN.last_heard %}
            {{ info.OTN.last_heard | int | timestamp_local }}
          {% else %}unbekannt{% endif %}
        icon: mdi:clock-check-outline

  # Trigger-based sensor: Chat History (last 30 messages)
  - trigger:
      - trigger: event
        event_type: meshtastic_chat_message
    sensor:
      - name: "Mesh Chat History"
        unique_id: meshtastic_chat_history
        state: >-
          {{ now().strftime('%H:%M:%S') }}
        attributes:
          messages: >-
            {% set current = this.attributes.get('messages', []) %}
            {% if current is string or current is not iterable %}{% set current = [] %}{% endif %}
            {% set new_msg = {
              'text': trigger.event.data.text | default(''),
              'sender': trigger.event.data.sender | default('?'),
              'channel': trigger.event.data.channel | default('?'),
              'time': trigger.event.data.time | default(now().strftime('%H:%M')),
              'dir': trigger.event.data.dir | default('in')
            } %}
            {{ (current + [new_msg])[-30:] }}
        icon: mdi:chat

# -----------------------------------------------------------------------------
# Zone: Ottobrunn (Karten-Standardansicht)
# -----------------------------------------------------------------------------
zone:
  - name: "Ottobrunn"
    latitude: 48.064
    longitude: 11.665
    radius: 2000
    icon: mdi:map-marker

# -----------------------------------------------------------------------------
# Script: Nachricht senden
# -----------------------------------------------------------------------------
script:
  meshtastic_send:
    alias: "Meshtastic Nachricht senden"
    description: "Sendet eine Textnachricht ueber das Meshtastic Mesh-Netzwerk"
    icon: mdi:send
    sequence:
      - variables:
          selected_channel: "{{ states('input_select.meshtastic_channel') }}"
          message_text: "{{ states('input_text.meshtastic_message') }}"
      - condition: template
        value_template: "{{ message_text | length > 0 }}"
      # Send via bridge -> HTTP API (meshtastic/send topic)
      - action: mqtt.publish
        data:
          topic: "meshtastic/send"
          payload: >-
            {"text": "{{ message_text }}", "channel": "{{ selected_channel }}"}
      - event: meshtastic_chat_message
        event_data:
          text: "{{ message_text }}"
          sender: "Ich"
          channel: "{{ selected_channel }}"
          time: "{{ now().strftime('%H:%M') }}"
          dir: "out"
      - action: input_text.set_value
        target:
          entity_id: input_text.meshtastic_message
        data:
          value: ""
