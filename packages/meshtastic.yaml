        {% if value_json.type == 'position' and value_json.from == 1129993620
           and value_json.payload.longitude_i is defined %}
          {{ (value_json.payload.longitude_i / 10000000) | round(6) }}
        {% endif %}
      icon: mdi:crosshairs-gps

    # =========================================================================
    # RSSI / SNR (letzte empfangene Werte pro Geraet)
    # =========================================================================
