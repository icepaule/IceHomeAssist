# =============================================================================
# Meshtastic MQTT Integration Package
# =============================================================================
# Pure MQTT sensor integration for Meshtastic mesh network
# Devices publish JSON via MQTT Gateways (T-Beam GW + Supreme)
#
# Topic structure: msh/EU_868/2/json/<channel>/<gwNodeId>
# Subscribe to +/+ to receive from either gateway, filter by value_json.from
#
# Node IDs:
#   T-Beam SX1276 (GW):  !1c5079a0 / 475036064
#   T-Beam Supreme:       !435a5594 / 1129993620
#   T-Deck Plus:          !4ed377c8 / 1322481608
#   OTN TDeck:            !33468b74 / 860261236
# =============================================================================

# -----------------------------------------------------------------------------
# Input Helpers
# -----------------------------------------------------------------------------
input_text:
  meshtastic_message:
    name: "Meshtastic Nachricht"
    initial: ""
    max: 228
    icon: mdi:message-text-outline
  meshtastic_last_msg_id:
    name: "Letzte Mesh Message ID (Dedup)"
    initial: "0"
    max: 20

input_select:
  meshtastic_channel:
    name: "Meshtastic Kanal"
    options:
      - "LongFast"
      - "IceMesh"
      - "THW-OMUO"
    initial: "IceMesh"
    icon: mdi:radio-tower

# -----------------------------------------------------------------------------
# MQTT Sensors
# -----------------------------------------------------------------------------
mqtt:
  sensor:
    # =========================================================================
    # T-Beam SX1276 Gateway (!1c5079a0 / 475036064)
    # =========================================================================
    - name: "Mesh GW Battery"
      unique_id: meshtastic_gw_battery
      state_topic: "msh/EU_868/2/json/+/+"
      value_template: >-
        {% if value_json.type == 'telemetry' and value_json.from == 475036064
           and value_json.payload.battery_level is defined %}
          {{ value_json.payload.battery_level }}
        {% endif %}
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      icon: mdi:battery

    - name: "Mesh GW Voltage"
      unique_id: meshtastic_gw_voltage
      state_topic: "msh/EU_868/2/json/+/+"
      value_template: >-
        {% if value_json.type == 'telemetry' and value_json.from == 475036064
           and value_json.payload.voltage is defined %}
          {{ value_json.payload.voltage | round(2) }}
        {% endif %}
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement

    - name: "Mesh GW Channel Util"
      unique_id: meshtastic_gw_channel_util
      state_topic: "msh/EU_868/2/json/+/+"
      value_template: >-
        {% if value_json.type == 'telemetry' and value_json.from == 475036064
           and value_json.payload.channel_utilization is defined %}
          {{ value_json.payload.channel_utilization | round(1) }}
        {% endif %}
      unit_of_measurement: "%"
      state_class: measurement
      icon: mdi:signal

    - name: "Mesh GW Air Util TX"
      unique_id: meshtastic_gw_air_util_tx
      state_topic: "msh/EU_868/2/json/+/+"
      value_template: >-
        {% if value_json.type == 'telemetry' and value_json.from == 475036064
           and value_json.payload.air_util_tx is defined %}
          {{ value_json.payload.air_util_tx | round(1) }}
        {% endif %}
      unit_of_measurement: "%"
      state_class: measurement
      icon: mdi:broadcast

    - name: "Mesh GW Uptime"
      unique_id: meshtastic_gw_uptime
      state_topic: "msh/EU_868/2/json/+/+"
      value_template: >-
        {% if value_json.type == 'telemetry' and value_json.from == 475036064
           and value_json.payload.uptime_seconds is defined %}
          {{ value_json.payload.uptime_seconds }}
        {% endif %}
      unit_of_measurement: "s"
      device_class: duration
      state_class: total_increasing
      icon: mdi:clock-outline

    # =========================================================================
    # T-Beam Supreme (!435a5594 / 1129993620)
